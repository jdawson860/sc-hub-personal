<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>S&C Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #081830;
      --navy2: #0d2545;
      --accent: #1e90ff;
      --accent2: #00c8a0;
      --warn: #ff6b35;
      --red: #e63946;
      --bg: #f0f4f8;
      --card: #ffffff;
      --text: #1a2332;
      --muted: #6b7a99;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    .header {
      background: var(--navy);
      color: white;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-logo {
      width: 38px; height: 38px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 900; color: white;
    }
    .header-title { font-size: 18px; font-weight: 700; letter-spacing: 0.3px; }
    .header-sub { font-size: 12px; color: #8fa0be; margin-top: 1px; }

    /* VIEW TOGGLE */
    .view-toggle {
      display: flex;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 3px;
      gap: 2px;
    }
    .view-btn {
      padding: 6px 16px;
      border: none;
      background: transparent;
      color: #8fa0be;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .view-btn.active {
      background: var(--accent);
      color: white;
    }

    /* ATHLETE SELECTOR */
    .athlete-bar {
      background: var(--navy2);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .athlete-bar label { color: #8fa0be; font-size: 13px; font-weight: 600; }
    .athlete-select {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      color: white;
      padding: 7px 14px;
      border-radius: 7px;
      font-size: 14px;
      cursor: pointer;
      outline: none;
    }
    .athlete-select option { background: #0d2545; }

    /* MAIN */
    .main { padding: 24px; max-width: 1400px; margin: 0 auto; }

    /* SECTION TITLE */
    .section-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 14px;
      margin-top: 28px;
    }
    .section-title:first-child { margin-top: 0; }

    /* STAT CARDS */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 0;
    }
    .stat-card {
      background: var(--card);
      border-radius: 12px;
      padding: 18px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      border-left: 4px solid var(--accent);
    }
    .stat-card.warn { border-left-color: var(--warn); }
    .stat-card.green { border-left-color: var(--accent2); }
    .stat-card.red { border-left-color: var(--red); }
    .stat-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 6px; }
    .stat-value { font-size: 28px; font-weight: 800; color: var(--navy); line-height: 1; }
    .stat-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* CARDS */
    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .card-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 16px;
    }

    /* GRID LAYOUTS */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

    /* ATHLETE TABLE (coach view) */
    .athlete-table { width: 100%; border-collapse: collapse; }
    .athlete-table th {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      text-align: left;
      padding: 8px 12px;
      border-bottom: 2px solid var(--bg);
    }
    .athlete-table td {
      padding: 10px 12px;
      font-size: 14px;
      border-bottom: 1px solid var(--bg);
    }
    .athlete-table tr:last-child td { border-bottom: none; }
    .athlete-table tr:hover td { background: #f8fafc; cursor: pointer; }
    .athlete-name { font-weight: 700; color: var(--navy); }
    .rpe-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }
    .rpe-low { background: #e8f5e9; color: #2e7d32; }
    .rpe-mid { background: #fff3e0; color: #e65100; }
    .rpe-high { background: #fce4ec; color: #c62828; }

    /* SESSION BADGES */
    .session-badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      margin: 1px;
    }
    .sb-la { background: #e3f2fd; color: #1565c0; }
    .sb-lb { background: #e8f5e9; color: #2e7d32; }
    .sb-ua { background: #f3e5f5; color: #6a1b9a; }
    .sb-ub { background: #fff3e0; color: #e65100; }

    /* MINI BAR */
    .mini-bar-wrap { display: flex; align-items: center; gap: 6px; }
    .mini-bar-bg { flex: 1; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
    .mini-bar-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width 0.4s; }

    /* EXERCISE PROGRESSION */
    .exercise-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }
    .ex-card {
      background: var(--card);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .ex-card-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    canvas { width: 100% !important; }

    /* SESSION HISTORY TABLE */
    .history-table { width: 100%; border-collapse: collapse; }
    .history-table th {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--muted); text-align: left;
      padding: 6px 10px; border-bottom: 2px solid var(--bg);
    }
    .history-table td { padding: 9px 10px; font-size: 13px; border-bottom: 1px solid var(--bg); }
    .history-table tr:last-child td { border-bottom: none; }

    /* LOADING */
    .loading {
      display: flex; align-items: center; justify-content: center;
      height: 200px; color: var(--muted); font-size: 15px;
      gap: 10px;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--bg);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* EMPTY */
    .empty { text-align: center; color: var(--muted); padding: 40px; font-size: 14px; }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .header { padding: 0 14px; }
      .header-title { font-size: 15px; }
      .main { padding: 14px; }
      .two-col, .three-col { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .view-btn { padding: 5px 10px; font-size: 12px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-logo">S&C</div>
    <div>
      <div class="header-title">Cranbrook Rowing</div>
      <div class="header-sub">Strength & Conditioning Dashboard</div>
    </div>
  </div>
  <div class="view-toggle">
    <button class="view-btn active" id="btnCoach" onclick="switchView('coach')">Coach</button>
    <button class="view-btn" id="btnAthlete" onclick="switchView('athlete')">Athlete</button>
  </div>
</div>

<div class="athlete-bar" id="athleteBar" style="display:none;">
  <label>ATHLETE</label>
  <select class="athlete-select" id="athleteSelect" onchange="loadAthleteView()">
    <option>Loading...</option>
  </select>
</div>

<div class="main" id="mainContent">
  <div class="loading"><div class="spinner"></div> Loading data…</div>
</div>

<script>
const API = 'https://superagent-84188511.base44.app/functions/getDashboardData';
let currentView = 'coach';
let coachData = null;
let athleteData = null;
let chartInstances = {};

function destroyCharts() {
  Object.values(chartInstances).forEach(c => c.destroy());
  chartInstances = {};
}

async function fetchData(payload) {
  const res = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  return res.json();
}

function switchView(view) {
  currentView = view;
  document.getElementById('btnCoach').classList.toggle('active', view === 'coach');
  document.getElementById('btnAthlete').classList.toggle('active', view === 'athlete');
  document.getElementById('athleteBar').style.display = view === 'athlete' ? 'flex' : 'none';
  if (view === 'coach') loadCoachView();
  else loadAthleteView();
}

// ─── COACH VIEW ───────────────────────────────────────────────────────────────

async function loadCoachView() {
  destroyCharts();
  document.getElementById('mainContent').innerHTML = '<div class="loading"><div class="spinner"></div> Loading squad data…</div>';
  try {
    coachData = await fetchData({ view: 'coach' });
    renderCoachView(coachData);
  } catch (e) {
    document.getElementById('mainContent').innerHTML = `<div class="empty">Error loading data: ${e.message}</div>`;
  }
}

function renderCoachView(data) {
  const { athleteSummary, rpeTrend, athletes } = data;
  const totalSessions = athleteSummary.reduce((a, b) => a + b.totalSessions, 0);
  const avgRpe = athleteSummary.length ? (athleteSummary.reduce((a, b) => a + b.avgRpe, 0) / athleteSummary.length).toFixed(1) : '-';
  const highRpeTotal = athleteSummary.reduce((a, b) => a + b.highRpeSets, 0);
  const activeAthletes = athleteSummary.filter(a => {
    if (!a.lastSession) return false;
    const diff = (new Date() - new Date(a.lastSession)) / 86400000;
    return diff <= 7;
  }).length;

  document.getElementById('mainContent').innerHTML = `
    <div class="section-title">Squad Overview</div>
    <div class="stats-grid">
      <div class="stat-card green">
        <div class="stat-label">Active Athletes</div>
        <div class="stat-value">${activeAthletes}<span style="font-size:14px;color:var(--muted)">/${athletes.length}</span></div>
        <div class="stat-sub">Trained this week</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Sessions</div>
        <div class="stat-value">${totalSessions}</div>
        <div class="stat-sub">All time logged</div>
      </div>
      <div class="stat-card warn">
        <div class="stat-label">Avg Squad RPE</div>
        <div class="stat-value">${avgRpe}</div>
        <div class="stat-sub">Across all athletes</div>
      </div>
      <div class="stat-card red">
        <div class="stat-label">High RPE Sets</div>
        <div class="stat-value">${highRpeTotal}</div>
        <div class="stat-sub">RPE ≥ 9</div>
      </div>
    </div>

    <div class="section-title">Athlete Summary</div>
    <div class="card">
      <table class="athlete-table" id="athleteTable">
        <thead>
          <tr>
            <th>Athlete</th>
            <th>Last Session</th>
            <th>Sessions</th>
            <th>Session Types</th>
            <th>Avg RPE</th>
            <th>⚡ High RPE</th>
            <th>Load Trend (4wk)</th>
          </tr>
        </thead>
        <tbody id="athleteTableBody"></tbody>
      </table>
    </div>

    <div class="section-title">Squad RPE Trend</div>
    <div class="card">
      <div class="card-title">Average Squad RPE — Last 30 Days</div>
      <canvas id="rpeChart" height="80"></canvas>
    </div>
  `;

  // Populate table
  const tbody = document.getElementById('athleteTableBody');
  const maxSessions = Math.max(...athleteSummary.map(a => a.totalSessions), 1);
  athleteSummary.forEach(a => {
    const rpeClass = a.avgRpe >= 8.5 ? 'rpe-high' : a.avgRpe >= 7.5 ? 'rpe-mid' : 'rpe-low';
    const daysSince = a.lastSession ? Math.floor((new Date() - new Date(a.lastSession)) / 86400000) : null;
    const lastStr = daysSince === null ? '—' : daysSince === 0 ? 'Today' : daysSince === 1 ? 'Yesterday' : `${daysSince}d ago`;
    const maxVol = Math.max(...a.weeklyLoad.map(w => w.totalVolume), 1);
    const lastVol = a.weeklyLoad[3]?.totalVolume || 0;
    const barPct = Math.round((lastVol / maxVol) * 100);

    const sessionBadges = Object.entries(a.sessionCounts)
      .filter(([, v]) => v > 0)
      .map(([k, v]) => {
        const cls = k === 'Lower A' ? 'sb-la' : k === 'Lower B' ? 'sb-lb' : k === 'Upper A' ? 'sb-ua' : 'sb-ub';
        return `<span class="session-badge ${cls}">${k} ×${v}</span>`;
      }).join('');

    const tr = document.createElement('tr');
    tr.onclick = () => { switchView('athlete'); document.getElementById('athleteSelect').value = a.athlete; loadAthleteView(); };
    tr.innerHTML = `
      <td><span class="athlete-name">${a.athlete}</span></td>
      <td style="color:${daysSince > 7 ? 'var(--red)' : 'var(--text)'}">${lastStr}</td>
      <td>
        <div class="mini-bar-wrap">
          <div class="mini-bar-bg"><div class="mini-bar-fill" style="width:${Math.round(a.totalSessions/maxSessions*100)}%"></div></div>
          <span style="font-size:13px;font-weight:700">${a.totalSessions}</span>
        </div>
      </td>
      <td>${sessionBadges || '<span style="color:var(--muted)">—</span>'}</td>
      <td><span class="rpe-badge ${rpeClass}">${a.avgRpe}</span></td>
      <td style="color:${a.highRpeSets > 3 ? 'var(--red)' : 'var(--text)'}; font-weight:${a.highRpeSets > 3 ? 700 : 400}">${a.highRpeSets}</td>
      <td>
        <div class="mini-bar-wrap">
          <div class="mini-bar-bg" style="background:#e3f2fd"><div class="mini-bar-fill" style="width:${barPct}%;background:var(--accent2)"></div></div>
          <span style="font-size:11px;color:var(--muted)">${lastVol > 0 ? lastVol.toLocaleString() : '—'}</span>
        </div>
      </td>
    `;
    tbody.appendChild(tr);
  });

  // RPE Trend Chart
  if (rpeTrend.length > 0) {
    const ctx = document.getElementById('rpeChart').getContext('2d');
    chartInstances['rpe'] = new Chart(ctx, {
      type: 'line',
      data: {
        labels: rpeTrend.map(r => r.date.slice(5)),
        datasets: [{
          label: 'Avg RPE',
          data: rpeTrend.map(r => r.avgRpe),
          borderColor: '#1e90ff',
          backgroundColor: 'rgba(30,144,255,0.08)',
          borderWidth: 2.5,
          pointRadius: 4,
          pointBackgroundColor: '#1e90ff',
          fill: true,
          tension: 0.4
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          y: { min: 5, max: 10, grid: { color: '#f0f4f8' }, ticks: { font: { size: 12 } } },
          x: { grid: { display: false }, ticks: { font: { size: 11 } } }
        }
      }
    });
  }
}

// ─── ATHLETE VIEW ─────────────────────────────────────────────────────────────

async function loadAthleteView() {
  const athlete = document.getElementById('athleteSelect')?.value;
  if (!athlete || athlete === 'Loading...') return;
  destroyCharts();
  document.getElementById('mainContent').innerHTML = '<div class="loading"><div class="spinner"></div> Loading athlete data…</div>';
  try {
    athleteData = await fetchData({ view: 'athlete', athlete });
    renderAthleteView(athleteData);
  } catch (e) {
    document.getElementById('mainContent').innerHTML = `<div class="empty">Error: ${e.message}</div>`;
  }
}

function renderAthleteView(data) {
  const { athlete, exerciseProgressions, sessionHistory } = data;
  const totalSets = data.logs.length;
  const sessions = sessionHistory.length;
  const avgRpe = data.logs.filter(r => r.rpe).length > 0
    ? (data.logs.filter(r => r.rpe).reduce((a, b) => a + b.rpe, 0) / data.logs.filter(r => r.rpe).length).toFixed(1)
    : '—';
  const maxLoad = data.logs.reduce((max, r) => {
    const v = parseFloat(r.load); return (!isNaN(v) && v > max) ? v : max;
  }, 0);

  document.getElementById('mainContent').innerHTML = `
    <div class="section-title">Overview — ${athlete}</div>
    <div class="stats-grid">
      <div class="stat-card green">
        <div class="stat-label">Sessions Logged</div>
        <div class="stat-value">${sessions}</div>
        <div class="stat-sub">Total tracked</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Sets</div>
        <div class="stat-value">${totalSets}</div>
        <div class="stat-sub">All exercises</div>
      </div>
      <div class="stat-card warn">
        <div class="stat-label">Avg RPE</div>
        <div class="stat-value">${avgRpe}</div>
        <div class="stat-sub">Across all sets</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Peak Load</div>
        <div class="stat-value">${maxLoad > 0 ? maxLoad + '<span style="font-size:14px">kg</span>' : '—'}</div>
        <div class="stat-sub">Heaviest single set</div>
      </div>
    </div>

    <div class="section-title">Session History</div>
    <div class="card">
      <table class="history-table">
        <thead><tr><th>Date</th><th>Session</th><th>Exercises</th><th>Sets</th><th>Avg RPE</th></tr></thead>
        <tbody id="historyBody"></tbody>
      </table>
    </div>

    <div class="section-title">Exercise Progressions</div>
    <div class="exercise-grid" id="exerciseGrid"></div>
  `;

  // History
  const hbody = document.getElementById('historyBody');
  sessionHistory.forEach(s => {
    const cls = s.session_type === 'Lower A' ? 'sb-la' : s.session_type === 'Lower B' ? 'sb-lb' : s.session_type === 'Upper A' ? 'sb-ua' : 'sb-ub';
    const rpeClass = s.avgRpe >= 8.5 ? 'rpe-high' : s.avgRpe >= 7.5 ? 'rpe-mid' : 'rpe-low';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="font-weight:600">${s.date}</td>
      <td><span class="session-badge ${cls}">${s.session_type}</span></td>
      <td style="color:var(--muted);font-size:12px">${s.exercises.slice(0,3).join(', ')}${s.exercises.length > 3 ? ` +${s.exercises.length-3}` : ''}</td>
      <td style="font-weight:600">${s.totalSets}</td>
      <td><span class="rpe-badge ${rpeClass}">${s.avgRpe || '—'}</span></td>
    `;
    hbody.appendChild(tr);
  });

  // Exercise charts
  const grid = document.getElementById('exerciseGrid');
  exerciseProgressions.filter(ep => ep.points.length >= 1).forEach((ep, idx) => {
    const div = document.createElement('div');
    div.className = 'ex-card';
    const canvasId = `ex_chart_${idx}`;
    div.innerHTML = `<div class="ex-card-title">${ep.exercise}</div><canvas id="${canvasId}" height="110"></canvas>`;
    grid.appendChild(div);

    setTimeout(() => {
      const ctx = document.getElementById(canvasId)?.getContext('2d');
      if (!ctx) return;
      const hasLoad = ep.points.some(p => p.avgLoad !== null);
      chartInstances[canvasId] = new Chart(ctx, {
        type: 'line',
        data: {
          labels: ep.points.map(p => p.date.slice(5)),
          datasets: [
            ...(hasLoad ? [{
              label: 'Avg Load (kg)',
              data: ep.points.map(p => p.avgLoad),
              borderColor: '#1e90ff',
              backgroundColor: 'rgba(30,144,255,0.07)',
              borderWidth: 2,
              pointRadius: 4,
              fill: true,
              tension: 0.4,
              yAxisID: 'y'
            }] : []),
            {
              label: 'Avg RPE',
              data: ep.points.map(p => p.avgRpe),
              borderColor: '#ff6b35',
              borderWidth: 2,
              borderDash: [4, 3],
              pointRadius: 3,
              fill: false,
              tension: 0.4,
              yAxisID: hasLoad ? 'y2' : 'y'
            }
          ]
        },
        options: {
          responsive: true,
          interaction: { mode: 'index', intersect: false },
          plugins: { legend: { display: ep.points.length > 1, labels: { font: { size: 10 }, boxWidth: 12 } } },
          scales: {
            y: {
              position: 'left',
              grid: { color: '#f0f4f8' },
              ticks: { font: { size: 10 } },
              title: { display: hasLoad, text: 'kg', font: { size: 10 } }
            },
            ...(hasLoad ? {
              y2: {
                position: 'right',
                min: 5, max: 10,
                grid: { drawOnChartArea: false },
                ticks: { font: { size: 10 } },
                title: { display: true, text: 'RPE', font: { size: 10 } }
              }
            } : {}),
            x: { grid: { display: false }, ticks: { font: { size: 10 } } }
          }
        }
      });
    }, 50);
  });

  if (exerciseProgressions.filter(e => e.points.length >= 1).length === 0) {
    grid.innerHTML = '<div class="empty">No exercise data yet</div>';
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────

async function init() {
  // Load athletes list first for the selector
  try {
    const d = await fetchData({ view: 'coach' });
    coachData = d;
    if (d.athletes && d.athletes.length > 0) {
      const sel = document.getElementById('athleteSelect');
      sel.innerHTML = d.athletes.map(a => `<option value="${a}">${a}</option>`).join('');
    }
    renderCoachView(d);
  } catch(e) {
    document.getElementById('mainContent').innerHTML = `<div class="empty">Failed to load: ${e.message}</div>`;
  }
}

init();
</script>
</body>
</html>
