<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>S&C Dashboard — Cranbrook Rowing</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --navy:#07122b;--navy2:#0c1f48;--navy3:#102460;
      --accent:#e63946;--accent2:#e63946;
      --warn:#f59e0b;--red:#e63946;--green:#22c55e;
      --bg:#07122b;--card:#fff;--text:#07122b;--muted:#5a6a8a;--border:#d0daf0;
      --page-muted:#8fa0be;
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

    /* HEADER */
    .header{background:var(--navy);color:#fff;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.35)}
    .header-left{display:flex;align-items:center;gap:12px}
    .header-logo{width:48px;height:48px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .header-logo img{width:48px;height:48px;object-fit:contain;filter:drop-shadow(0 1px 3px rgba(0,0,0,.3))}
    .header-title{font-size:17px;font-weight:800}
    .header-sub{font-size:12px;color:#8fa0be;margin-top:1px}
    .view-toggle{display:flex;background:rgba(255,255,255,.1);border-radius:8px;padding:3px;gap:2px}
    .view-btn{padding:6px 16px;border:none;background:transparent;color:#8fa0be;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s}
    .view-btn.active{background:var(--red);color:#fff}

    /* SUB-NAV */
    .subnav{background:var(--navy2);padding:0 24px;display:flex;align-items:center;gap:4px;border-bottom:1px solid rgba(255,255,255,.07)}
    .snav-btn{padding:12px 16px;border:none;background:transparent;color:#8fa0be;font-size:13px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:6px}
    .snav-btn.active{color:#fff;border-bottom-color:var(--red)}
    .athlete-sel-wrap{margin-left:auto;display:flex;align-items:center;gap:8px}
    .athlete-sel-wrap label{color:#8fa0be;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
    .athlete-select{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;padding:6px 12px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;outline:none}
    .athlete-select option{background:#0d2545}

    /* LAYOUT */
    .main{padding:24px;max-width:1400px;margin:0 auto;background:var(--bg)}
    .section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:#8fa0be;margin-bottom:12px;margin-top:28px}
    .section-title:first-child{margin-top:0}

    /* STATS */
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
    .stat-card{background:var(--card);border-radius:12px;padding:16px 18px;box-shadow:0 2px 12px rgba(0,0,0,.25);border-left:4px solid var(--red)}
    .stat-card.warn{border-left-color:var(--warn)}
    .stat-card.green{border-left-color:#22c55e}
    .stat-card.red{border-left-color:var(--red)}
    .stat-card.purple{border-left-color:#8b5cf6}
    .stat-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:5px}
    .stat-value{font-size:26px;font-weight:800;color:var(--navy);line-height:1}
    .stat-sub{font-size:11px;color:var(--muted);margin-top:4px}

    /* CARDS */
    .card{background:var(--card);border-radius:14px;padding:20px;box-shadow:0 2px 16px rgba(0,0,0,.3)}
    .card-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:16px}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}

    /* TABLES */
    .data-table{width:100%;border-collapse:collapse}
    .data-table th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);text-align:left;padding:8px 12px;border-bottom:2px solid var(--border)}
    .data-table td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
    .data-table tr:last-child td{border-bottom:none}
    .data-table tr:hover td{background:#f8fafc;cursor:pointer}
    .row-optimal td{background:rgba(34,197,94,.06)!important}
    .row-caution td{background:rgba(245,158,11,.07)!important}
    .row-danger td{background:rgba(230,57,70,.08)!important}
    .row-low td{background:rgba(59,130,246,.06)!important}
    .athlete-name{font-weight:700;color:var(--navy);font-size:14px}

    /* BADGES */
    .rpe-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:12px;font-weight:700}
    .rpe-low{background:#e8f5e9;color:#2e7d32}
    .rpe-mid{background:#fff3e0;color:#e65100}
    .rpe-high{background:#fce4ec;color:#c62828}
    .acwr-badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:800}
    .acwr-optimal{background:#e8f5e9;color:#2e7d32}
    .acwr-low{background:#e3f2fd;color:#1565c0}
    .acwr-caution{background:#fff3e0;color:#e65100}
    .acwr-danger{background:#fce4ec;color:#c62828}
    .acwr-none{background:#f0f4f8;color:var(--muted)}
    .session-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700;margin:1px}
    .sb-la{background:#dbeafe;color:#1a56db}
    .sb-lb{background:#dcfce7;color:#15803d}
    .sb-ua{background:#ede9fe;color:#6d28d9}
    .sb-ub{background:#ffedd5;color:#c2410c}

    /* ACWR zone bar */
    .acwr-zone-bar{position:relative;height:8px;border-radius:4px;background:linear-gradient(to right,#90caf9 0%,#90caf9 22%,#a5d6a7 22%,#a5d6a7 61%,#ffe082 61%,#ffe082 78%,#ef9a9a 78%,#ef9a9a 100%);margin-bottom:6px}
    .acwr-zone-marker{position:absolute;top:-4px;width:16px;height:16px;background:var(--navy);border-radius:50%;transform:translateX(-50%);border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3);transition:left .5s}
    .acwr-zones-label{display:flex;justify-content:space-between;font-size:9px;color:var(--muted);font-weight:600;margin-top:2px}

    /* MINI BAR */
    .mini-bar-wrap{display:flex;align-items:center;gap:6px}
    .mini-bar-bg{flex:1;height:6px;background:#dde8ff;border-radius:3px;overflow:hidden}
    .mini-bar-fill{height:100%;border-radius:3px;background:var(--red);transition:width .4s}

    /* COMPLIANCE HEATMAP */
    .heatmap-grid{display:grid;gap:6px}
    .heatmap-row{display:flex;align-items:center;gap:8px}
    .heatmap-label{font-size:12px;font-weight:700;color:var(--navy);width:28px;flex-shrink:0}
    .heatmap-cells{display:flex;gap:4px;flex:1}
    .heatmap-cell{flex:1;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;transition:transform .15s;cursor:default}
    .heatmap-cell:hover{transform:scale(1.05)}
    .heatmap-cell.done{background:#00c8a0;color:#fff}
    .heatmap-cell.miss{background:#fce4ec;color:#c62828}
    .heatmap-cell.none{background:#f0f4f8;color:var(--muted)}
    .heatmap-headers{display:flex;gap:4px;margin-bottom:4px;padding-left:36px}
    .heatmap-headers span{flex:1;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted);text-align:center;letter-spacing:.5px}

    /* PB TABLE */
    .pb-table{width:100%;border-collapse:collapse}
    .pb-table th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);text-align:left;padding:6px 10px;border-bottom:2px solid var(--border)}
    .pb-table td{padding:8px 10px;font-size:13px;border-bottom:1px solid var(--border)}
    .pb-table tr:last-child td{border-bottom:none}
    .pb-val{font-weight:800;color:var(--navy)}
    .pb-crown{color:#f59e0b;margin-right:3px}

    /* EXERCISE GRID */
    .exercise-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
    .ex-card{background:var(--card);border-radius:12px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
    .ex-card-title{font-size:11px;font-weight:700;color:var(--navy);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}

    /* ERG */
    .erg-split{font-family:monospace;font-weight:700;color:var(--navy);font-size:14px}
    .split-badge{display:inline-block;padding:3px 10px;background:#e3f2fd;color:#1565c0;border-radius:20px;font-size:12px;font-weight:800;font-family:monospace}
    .wt-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700}
    .wt-ut2{background:#e8f5e9;color:#2e7d32}
    .wt-ut1{background:#e3f2fd;color:#1565c0}
    .wt-at{background:#ede9fe;color:#6d28d9}
    .wt-tr{background:#fff3e0;color:#e65100}
    .wt-an{background:#fce4ec;color:#c62828}
    .wt-other{background:#f0f4f8;color:var(--muted)}

    /* TESTING */
    .rank-badge{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;font-size:12px;font-weight:800}
    .rank-1{background:#ffd700;color:#7a5c00}
    .rank-2{background:#e0e0e0;color:#555}
    .rank-3{background:#cd7f32;color:#fff}
    .rank-other{background:#f0f4f8;color:var(--muted)}
    .year-tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
    .year-tab{padding:7px 16px;border:2px solid var(--border);border-radius:20px;background:#fff;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
    .year-tab.active{background:var(--red);color:#fff;border-color:var(--red)}

    /* COMPARE */
    .compare-controls{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
    .compare-select{padding:8px 12px;border:2px solid #e2e8f0;border-radius:8px;font-size:13px;font-weight:600;outline:none;cursor:pointer}
    .compare-select:focus{border-color:var(--red)}

    /* UTIL */
    .loading{display:flex;align-items:center;justify-content:center;height:200px;color:#8fa0be;font-size:15px;gap:10px}
    .sync-indicator{font-size:11px;color:#8fa0be;display:flex;align-items:center;gap:5px;white-space:nowrap}
    .sync-dot{width:7px;height:7px;border-radius:50%;background:#8fa0be;flex-shrink:0;transition:background .3s}
    .sync-dot.fresh{background:#22c55e}
    .sync-dot.stale{background:#f59e0b}
    .csv-btn{padding:7px 14px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;transition:background .2s}
    .csv-btn:hover{background:rgba(255,255,255,.2)}
    .trend-up{color:#22c55e;font-weight:800;font-size:13px}
    .trend-down{color:#e63946;font-weight:800;font-size:13px}
    .trend-flat{color:#f59e0b;font-weight:800;font-size:13px}
    .trend-new{color:#8b5cf6;font-weight:800;font-size:11px}
    .pb-pill{display:inline-block;background:#fef3c7;color:#92400e;border-radius:10px;font-size:10px;font-weight:800;padding:1px 6px;margin-left:4px}
    .spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,.2);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty{text-align:center;color:var(--muted);padding:40px;font-size:14px}

    @media(max-width:768px){
      .header{padding:0 14px}
      .main{padding:12px}
      .two-col,.three-col{grid-template-columns:1fr}
      .stats-grid{grid-template-columns:repeat(2,1fr)}
      .subnav{padding:0 12px;overflow-x:auto}
    }

    /* ═══ SESSION DETAIL MODAL ═══ */
    .modal-overlay{position:fixed;inset:0;background:rgba(7,18,43,.6);z-index:999;display:flex;align-items:flex-start;justify-content:center;padding:32px 16px;overflow-y:auto;backdrop-filter:blur(2px)}
    .modal-overlay.hidden{display:none}
    .modal{background:#fff;border-radius:20px;width:100%;max-width:680px;box-shadow:0 24px 60px rgba(0,0,0,.25);overflow:hidden;animation:modalIn .2s ease}
    @keyframes modalIn{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
    .modal-header{background:var(--navy);color:#fff;padding:20px 24px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .modal-header-left{display:flex;flex-direction:column;gap:4px}
    .modal-title{font-size:18px;font-weight:800;letter-spacing:-.3px}
    .modal-subtitle{font-size:12px;color:#8fa0be}
    .modal-close{background:rgba(255,255,255,.12);border:none;color:#fff;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
    .modal-close:hover{background:rgba(255,255,255,.22)}
    .modal-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:1px;background:var(--border)}
    .modal-stat{background:#fff;padding:14px 16px;text-align:center}
    .modal-stat-val{font-size:20px;font-weight:800;color:var(--navy)}
    .modal-stat-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-top:2px}
    .modal-body{padding:20px 24px}
    .modal-section{margin-bottom:20px}
    .modal-section:last-child{margin-bottom:0}
    .modal-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px}
    .ex-block{background:#f0f5ff;border:1px solid #dde8ff;border-radius:10px;padding:12px 14px;margin-bottom:8px}
    .ex-block:last-child{margin-bottom:0}
    .ex-block-name{font-size:13px;font-weight:800;color:var(--navy);margin-bottom:8px;text-transform:uppercase;letter-spacing:.3px}
    .sets-row{display:flex;flex-wrap:wrap;gap:6px}
    .set-chip{background:#fff;border:2px solid var(--border);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;color:var(--navy);min-width:70px;text-align:center}
    .set-chip .set-num{font-size:9px;font-weight:600;color:var(--muted);display:block;margin-bottom:1px}
    .set-chip .set-load{font-size:14px;font-weight:800}
    .set-chip .set-rpe{font-size:10px;color:var(--muted);margin-top:1px}
    .erg-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .erg-detail-item{background:#f0f5ff;border:1px solid #dde8ff;border-radius:10px;padding:12px 14px}
    .erg-detail-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:4px}
    .erg-detail-value{font-size:18px;font-weight:800;color:var(--navy)}
    .erg-detail-value.split{font-family:monospace;color:var(--accent)}
    .erg-notes{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:12px 14px;font-size:13px;color:#92400e;line-height:1.5}
    .intervals-box{background:#f0f7ff;border:1px solid #bfdbfe;border-radius:10px;padding:12px 14px;font-size:13px;color:#1e40af;font-family:monospace;line-height:1.6}
    .interval-splits-table{width:100%;border-collapse:collapse;font-size:13px;border-radius:10px;overflow:hidden;border:1px solid #dde8ff}
    .interval-splits-table thead tr{background:var(--navy);color:#fff}
    .interval-splits-table th{padding:8px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;text-align:left}
    .interval-splits-table td{padding:9px 10px;border-bottom:1px solid #eef2ff;font-size:13px;font-weight:600;color:var(--navy)}
    .interval-splits-table tbody tr:last-child td{border-bottom:none}
    .interval-splits-table tbody tr:nth-child(even){background:#f8faff}
    .interval-splits-table .split-val{font-family:monospace;color:var(--accent);font-weight:700}
    .interval-splits-table .int-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;background:var(--navy);color:#fff;border-radius:50%;font-size:11px;font-weight:800}
    .empty{text-align:center;padding:40px;color:#8fa0be;font-size:14px}
    .clickable-row{cursor:pointer;transition:background .1s}
    .clickable-row:hover td{background:#eef4ff !important}

  </style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="header-logo"><img src="https://media.base44.com/images/public/6a2139cf1719e3fb84188511/dbd88bf6d_Cranbrooklogo.jpg" alt="Cranbrook School" /></div>
    <div>
      <div class="header-title">Cranbrook Rowing</div>
      <div class="header-sub">Strength & Conditioning Dashboard</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="sync-indicator" id="syncIndicator"><div class="sync-dot" id="syncDot"></div><span id="syncText">Checking…</span></div>
    <button class="csv-btn" id="csvBtn" onclick="exportCSV()" style="display:none">⬇ Export CSV</button>
    <button class="csv-btn" id="pdfBtn" onclick="exportWeeklyPDF()" style="display:none;background:var(--red);margin-left:4px">📄 Weekly Report</button>
  </div>
  <div class="view-toggle">
    <button class="view-btn active" id="btnCoach" onclick="switchView('coach')">Coach</button>
    <button class="view-btn" id="btnAthlete" onclick="switchView('athlete')">Athlete</button>
  </div>
</header>

<!-- SUBNAV (tabs + athlete selector) -->
<div class="subnav" id="subnav">
  <button class="snav-btn active" id="snav-sc" onclick="switchTab('sc')">💪 S&C</button>
  <button class="snav-btn" id="snav-erg" onclick="switchTab('erg')">🚣 Erg</button>
  <button class="snav-btn" id="snav-water" onclick="switchTab('water')">🌊 Water</button>
  <button class="snav-btn" id="snav-testing" onclick="switchTab('testing')">📋 Testing</button>
  <div class="athlete-sel-wrap" id="athSelWrap" style="display:none">
    <label>Athlete</label>
    <select class="athlete-select" id="athleteSelect" onchange="loadAthleteView()">
      <option>Loading…</option>
    </select>
  </div>
</div>


<!-- SESSION DETAIL MODAL -->
<div class="modal-overlay hidden" id="sessionModal" onclick="closeModal(event)">
  <div class="modal" id="sessionModalInner">
    <div class="modal-header">
      <div class="modal-header-left">
        <div class="modal-title" id="modalTitle">Session</div>
        <div class="modal-subtitle" id="modalSubtitle"></div>
      </div>
      <button class="modal-close" onclick="closeSessionModal()">✕</button>
    </div>
    <div class="modal-stats" id="modalStats"></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-body" id="modalCoachNotes" style="border-top:1px solid var(--border);padding-top:16px">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px">Coach Notes</div>
      <div id="coachNotesList" style="margin-bottom:12px;font-size:13px;color:var(--muted)">Loading notes…</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <input id="coachNoteInput" type="text" placeholder="Add a note (e.g. looked fatigued, great technique)…" style="flex:1;min-width:200px;padding:9px 12px;border:2px solid var(--border);border-radius:8px;font-size:13px;outline:none"/>
        <select id="coachNoteFlag" style="padding:9px 12px;border:2px solid var(--border);border-radius:8px;font-size:13px;outline:none;cursor:pointer">
          <option value="none">🏷 Tag</option>
          <option value="positive">✅ Positive</option>
          <option value="fatigue">😓 Fatigue</option>
          <option value="technique">🎯 Technique</option>
          <option value="injury">🚨 Injury</option>
          <option value="monitor">👁 Monitor</option>
        </select>
        <button onclick="saveCoachNote()" style="padding:9px 16px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:13px">Add Note</button>
      </div>
    </div>
  </div>
</div>

<div class="main" id="mainContent">
  <div class="loading"><div class="spinner"></div> Loading data…</div>
</div>

<script>
const API_SC    = 'https://superagent-84188511.base44.app/functions/getDashboardData';
const API_ERG   = 'https://superagent-84188511.base44.app/functions/getErgData';
const API_TEST  = 'https://superagent-84188511.base44.app/functions/getTestingData';
const API_WATER = 'https://superagent-84188511.base44.app/functions/getWaterData';

let currentView = 'coach';
let currentTab  = 'sc';
let coachData   = null;
let charts      = {};

function destroyCharts(){ Object.values(charts).forEach(c=>c.destroy()); charts={}; }

let lastSyncedAt = null;

async function fetchData(url, payload){
  const res = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload||{}) });
  lastSyncedAt = new Date();
  updateSyncIndicator();
  return res.json();
}

function updateSyncIndicator(){
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  if(!dot||!txt||!lastSyncedAt) return;
  const secAgo = Math.round((new Date()-lastSyncedAt)/1000);
  const minAgo = Math.floor(secAgo/60);
  const label = secAgo<10?'Just synced':minAgo<1?`${secAgo}s ago`:minAgo===1?'1 min ago':`${minAgo} min ago`;
  const fresh = minAgo < 5;
  dot.className = 'sync-dot '+(fresh?'fresh':'stale');
  txt.textContent = label;
}

// Refresh sync indicator every 30s
setInterval(updateSyncIndicator, 30000);

// ── SQUAD LOAD CALENDAR ───────────────────────────────────────────────
function renderSquadCalendar(calData) {
  const wrap = document.getElementById('squadCalendarWrap');
  if (!wrap || !calData.length) return;
  const maxLoad = Math.max(...calData.map(d => d.totalLoad), 1);
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const cellColor = (load) => {
    if (!load) return '#f0f4f8';
    const pct = load / maxLoad;
    if (pct < 0.25) return '#bfdbfe';
    if (pct < 0.5) return '#60a5fa';
    if (pct < 0.75) return '#2563eb';
    return '#1e3a8a';
  };
  const textColor = (load) => {
    if (!load) return '#b0bec5';
    const pct = load / maxLoad;
    return pct < 0.25 ? '#1e3a8a' : '#fff';
  };
  wrap.innerHTML = `
    <div style="display:flex;flex-wrap:wrap;gap:6px;padding:8px 0">
      ${calData.map(d => {
        const date = new Date(d.date);
        const dayName = dayNames[date.getDay()];
        const dayNum = date.getDate();
        const mon = date.toLocaleString('default',{month:'short'});
        const tip = d.totalLoad ? `${d.totalLoad.toLocaleString()}kg · ${d.sessions} sessions · ${d.athletes} athletes` : 'Rest day';
        return `<div title="${tip}" style="width:60px;border-radius:8px;padding:8px 4px;background:${cellColor(d.totalLoad)};text-align:center;cursor:default">
          <div style="font-size:9px;font-weight:700;color:${textColor(d.totalLoad)};text-transform:uppercase">${dayName}</div>
          <div style="font-size:14px;font-weight:800;color:${textColor(d.totalLoad)};margin:2px 0">${dayNum}</div>
          <div style="font-size:9px;color:${textColor(d.totalLoad)};opacity:.8">${mon}</div>
          ${d.totalLoad ? `<div style="font-size:9px;font-weight:700;color:${textColor(d.totalLoad)};margin-top:3px">${d.totalLoad>=1000?(d.totalLoad/1000).toFixed(1)+'k':d.totalLoad}</div>` : ''}
          ${d.athletes ? `<div style="font-size:9px;color:${textColor(d.totalLoad)};opacity:.7">${d.athletes}ath</div>` : ''}
        </div>`;
      }).join('')}
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-top:4px;font-size:11px;color:var(--muted)">
      <span>Low</span>
      ${['#bfdbfe','#60a5fa','#2563eb','#1e3a8a'].map(c=>`<div style="width:20px;height:12px;background:${c};border-radius:3px"></div>`).join('')}
      <span>High</span>
    </div>
  `;
}

function buildSquadRpeTrend(sums){
  // Returns last 30 days of per-athlete avg RPE trend (use acwr_history as a proxy for activity)
  // Simple: return empty — we'll build a per-athlete bar chart instead
  return [];
}

function buildSquadACWR(sums){
  // Merge all athlete ACWR histories by date, take average acwr per day
  const byDate={};
  sums.forEach(a=>{
    (a.acwr_history||[]).forEach(p=>{
      if(!byDate[p.date]) byDate[p.date]={acwr:[],acute:[],chronic:[]};
      if(p.acwr) byDate[p.date].acwr.push(p.acwr);
      if(p.acute) byDate[p.date].acute.push(p.acute);
      if(p.chronic) byDate[p.date].chronic.push(p.chronic);
    });
  });
  return Object.entries(byDate).sort(([a],[b])=>a.localeCompare(b)).map(([date,v])=>({
    date,
    acwr: v.acwr.length ? parseFloat((v.acwr.reduce((a,b)=>a+b,0)/v.acwr.length).toFixed(2)) : 0,
    acute: v.acute.length ? Math.round(v.acute.reduce((a,b)=>a+b,0)/v.acute.length) : 0,
    chronic: v.chronic.length ? Math.round(v.chronic.reduce((a,b)=>a+b,0)/v.chronic.length) : 0,
  }));
}

function renderACWRChart(canvasId, markerId, acwrData){
  if(!acwrData.length) return;
  const acwrPlugin={id:'acwrZones',beforeDraw(chart){
    const{ctx,chartArea:{left,right},scales:{y}}=chart;
    [{min:0,max:0.8,color:'rgba(144,202,249,.15)'},{min:0.8,max:1.3,color:'rgba(165,214,167,.20)'},{min:1.3,max:1.5,color:'rgba(255,224,130,.25)'},{min:1.5,max:2.5,color:'rgba(239,154,154,.25)'}].forEach(z=>{
      const yT=y.getPixelForValue(Math.min(z.max,y.max)),yB=y.getPixelForValue(Math.max(z.min,y.min));
      ctx.fillStyle=z.color;ctx.fillRect(left,yT,right-left,yB-yT);
    });
  }};
  const ctx=document.getElementById(canvasId)?.getContext('2d');
  if(!ctx) return;
  charts[canvasId]=new Chart(ctx,{
    type:'line',plugins:[acwrPlugin],
    data:{labels:acwrData.map(r=>r.date.slice(5)),datasets:[
      {label:'ACWR',data:acwrData.map(r=>r.acwr),borderColor:'#081830',backgroundColor:'rgba(8,24,48,.05)',borderWidth:2.5,pointRadius:2,fill:true,tension:.4,yAxisID:'y'},
      {label:'Acute (7d)',data:acwrData.map(r=>r.acute),borderColor:'#1e90ff',borderWidth:1.5,borderDash:[4,3],pointRadius:0,fill:false,tension:.4,yAxisID:'y2'},
      {label:'Chronic (28d)',data:acwrData.map(r=>r.chronic),borderColor:'#00c8a0',borderWidth:1.5,borderDash:[4,3],pointRadius:0,fill:false,tension:.4,yAxisID:'y2'},
    ]},
    options:{responsive:true,interaction:{mode:'index',intersect:false},plugins:{legend:{labels:{font:{size:11},boxWidth:12}}},
      scales:{
        y:{position:'left',min:0,max:2,grid:{color:'#f0f4f8'},ticks:{font:{size:11}},title:{display:true,text:'ACWR',font:{size:11}}},
        y2:{position:'right',grid:{drawOnChartArea:false},ticks:{font:{size:11}},title:{display:true,text:'Load',font:{size:10}}},
        x:{grid:{display:false},ticks:{font:{size:10},maxTicksLimit:14}}
      }
    }
  });
  const latest=acwrData[acwrData.length-1];
  if(latest && markerId){
    const marker=document.getElementById(markerId);
    if(marker) marker.style.left=Math.min(Math.max((latest.acwr/2)*100,2),98)+'%';
  }
}

async function renderComparison(){
  const ath1=document.getElementById('compareAth1')?.value;
  const ath2=document.getElementById('compareAth2')?.value;
  const exercise=document.getElementById('compareExercise')?.value;
  if(!ath1||!ath2||!exercise) return;
  if(charts['compare']){charts['compare'].destroy();delete charts['compare'];}
  const [d1,d2]=await Promise.all([
    fetchData(API_SC,{view:'athlete',athlete:ath1}),
    fetchData(API_SC,{view:'athlete',athlete:ath2})
  ]);
  const getPoints=(d,ex)=>{ const ep=(d.exerciseProgressions||[]).find(e=>e.exercise===ex); return ep?.points||[]; };
  const p1=getPoints(d1,exercise);
  const p2=getPoints(d2,exercise);
  const allDates=[...new Set([...p1.map(p=>p.date),...p2.map(p=>p.date)])].sort();
  const mapLoad=(pts,dates)=>dates.map(d=>{const f=pts.find(p=>p.date===d);return f?f.avgLoad:null;});
  const ctx=document.getElementById('compareChart')?.getContext('2d');
  if(!ctx) return;
  charts['compare']=new Chart(ctx,{
    type:'line',
    data:{labels:allDates.map(d=>d.slice(5)),datasets:[
      {label:`${ath1} — Load`,data:mapLoad(p1,allDates),borderColor:'#1a56db',backgroundColor:'rgba(26,86,219,.07)',borderWidth:2.5,pointRadius:4,fill:true,tension:.4,spanGaps:true},
      {label:`${ath2} — Load`,data:mapLoad(p2,allDates),borderColor:'#e63946',backgroundColor:'rgba(230,57,70,.07)',borderWidth:2.5,pointRadius:4,fill:true,tension:.4,spanGaps:true},
    ]},
    options:{responsive:true,interaction:{mode:'index',intersect:false},plugins:{legend:{labels:{font:{size:12},boxWidth:12}}},
      scales:{y:{grid:{color:'#f0f4f8'},ticks:{font:{size:11}},title:{display:true,text:'kg',font:{size:11}}},x:{grid:{display:false},ticks:{font:{size:11}}}}
    }
  });
}

// ═══════════════════════════════════════════════════
// ERG VIEW
// ═══════════════════════════════════════════════════
async function loadErgView(){
  destroyCharts();
  document.getElementById('mainContent').innerHTML='<div class="loading"><div class="spinner"></div> Loading erg data…</div>';
  try{
    const data=await fetchData(API_ERG,{});
    renderErgView(data);
  } catch(e){
    document.getElementById('mainContent').innerHTML=`<div class="empty">Error loading erg data: ${e.message}</div>`;
  }
}

function renderErgView(data){
  const sums=data.athlete_summaries||[];
  const athletes=data.athletes||[];
  const allSessions=(data.sessions||[]).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
  const totalDist=sums.reduce((a,s)=>a+(s.total_distance||0),0);
  const totalSess=sums.reduce((a,s)=>a+(s.total_sessions||0),0);

  // Best split overall
  const splitsWithData=allSessions.filter(s=>s.avg_split);
  const bestSplit=splitsWithData.length? [...splitsWithData].sort((a,b)=>a.avg_split.localeCompare(b.avg_split))[0]:null;

  document.getElementById('mainContent').innerHTML=`
    <div class="section-title">Erg Overview</div>
    <div class="stats-grid">
      <div class="stat-card green"><div class="stat-label">Athletes</div><div class="stat-value">${athletes.length}</div><div class="stat-sub">With erg data</div></div>
      <div class="stat-card"><div class="stat-label">Total Sessions</div><div class="stat-value">${totalSess}</div><div class="stat-sub">All time</div></div>
      <div class="stat-card purple"><div class="stat-label">Total Distance</div><div class="stat-value">${totalDist>=1000?(totalDist/1000).toFixed(1)+'k':totalDist}</div><div class="stat-sub">metres</div></div>
      <div class="stat-card warn"><div class="stat-label">Best Squad Split</div><div class="stat-value" style="font-size:18px">${bestSplit?bestSplit.avg_split:'—'}</div><div class="stat-sub">${bestSplit?bestSplit.athlete+' — '+bestSplit.workout_type:'No data yet'}</div></div>
    </div>

    <div class="section-title">Athlete Erg Summary</div>
    <div class="card">
      <table class="data-table">
        <thead><tr>
          <th>Athlete</th><th>Sessions</th><th>Total Distance</th><th>Last Session</th><th>Workout Type</th><th>Best Split</th><th>ACWR</th>
        </tr></thead>
        <tbody id="ergTableBody"></tbody>
      </table>
    </div>

    <div class="section-title">Best Splits — Leaderboard</div>
    <div class="card" style="margin-bottom:0">
      <div id="ergLeaderboard"><div style="color:var(--muted);text-align:center;padding:20px">No splits logged yet</div></div>
    </div>

    <div class="section-title">Recent Erg Sessions</div>
    <div class="card">
      <table class="data-table">
        <thead><tr>
          <th>Date</th><th>Athlete</th><th>Type</th><th>Distance</th><th>Time</th><th>Avg Split</th><th>HR</th><th>RPE</th><th></th>
        </tr></thead>
        <tbody id="ergSessionsBody"></tbody>
      </table>
    </div>

    ${athletes.length>0?`
    <div class="section-title">Distance per Athlete</div>
    <div class="card">
      <div class="card-title">Total erg metres — all time</div>
      <canvas id="ergDistChart" height="80"></canvas>
    </div>`:''}
  `;

  // Athlete summary table
  const eTbody=document.getElementById('ergTableBody');
  if(sums.length===0){
    eTbody.innerHTML='<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:30px">No erg sessions logged yet — athletes can log via the Athlete Hub</td></tr>';
  } else {
    sums.forEach(a=>{
      const acwrVal=a.acwr;
      const acwrCls=!acwrVal?'acwr-none':acwrVal<0.8?'acwr-low':acwrVal<=1.3?'acwr-optimal':acwrVal<=1.5?'acwr-caution':'acwr-danger';
      const ds=a.days_since_last;
      const lastStr=ds===null?'—':ds===0?'Today':ds===1?'Yesterday':`${ds}d ago`;
      const dist=a.total_distance||0;
      const tr=document.createElement('tr');
      tr.innerHTML=`
        <td><span class="athlete-name">${a.athlete}</span></td>
        <td style="font-weight:700">${a.total_sessions}</td>
        <td style="font-weight:700">${dist>=1000?(dist/1000).toFixed(1)+'km':dist+'m'}</td>
        <td>${lastStr}</td>
        <td>${a.last_session?.type?`<span class="wt-badge wt-${(a.last_session.type||'').toLowerCase().replace(/[^a-z0-9]/g,'').substring(0,4)}">${a.last_session.type}</span>`:'—'}</td>
        <td>${a.last_session?.split?`<span class="split-badge">${a.last_session.split}</span>`:'—'}</td>
        <td><span class="acwr-badge ${acwrCls}">${acwrVal?acwrVal.toFixed(2):'—'}</span></td>
      `;
      eTbody.appendChild(tr);
    });
  }

  // Recent sessions table
  const sSbody=document.getElementById('ergSessionsBody');
  if(allSessions.length===0){
    sSbody.innerHTML='<tr><td colspan="9" style="text-align:center;color:var(--muted);padding:30px">No sessions yet</td></tr>';
  } else {
    allSessions.slice(0,30).forEach(s=>{
      const date=s.timestamp?.slice(0,10)||'—';
      const rpeClass=(s.rpe||0)>=8.5?'rpe-high':(s.rpe||0)>=7.5?'rpe-mid':'rpe-low';
      const wtKey=(s.workout_type||'').toLowerCase().replace(/[^a-z0-9]/g,'').substring(0,4);
      const dist=s.total_distance?`${(s.total_distance/1000).toFixed(1)}km`:'—';
      const tr=document.createElement('tr');
      tr.className='clickable-row';
      tr.onclick=()=>openErgSession(s);
      tr.title='Click to view full session';
      tr.innerHTML=`
        <td style="font-weight:600">${date}</td>
        <td><span class="athlete-name">${s.athlete||'—'}</span></td>
        <td>${s.workout_type?`<span class="wt-badge wt-${wtKey}">${s.workout_type}</span>`:'—'}</td>
        <td>${dist}</td>
        <td style="font-family:monospace">${s.total_time||'—'}</td>
        <td>${s.avg_split?`<span class="split-badge">${s.avg_split}</span>`:'—'}</td>
        <td style="color:var(--muted)">${s.avg_heart_rate?s.avg_heart_rate+'bpm':'—'}</td>
        <td>${s.rpe?`<span class="rpe-badge ${rpeClass}">${s.rpe}</span>`:'—'}</td>
        <td style="color:var(--accent);font-size:11px;font-weight:600">View →</td>
      `;
      sSbody.appendChild(tr);
    });
  }

  // Erg leaderboard — best avg_split per athlete ranked
  const lbEl = document.getElementById('ergLeaderboard');
  if(lbEl && allSessions.filter(s=>s.avg_split).length > 0){
    // Group by athlete and find personal best split per athlete
    const athleteSplits = {};
    allSessions.forEach(s=>{
      if(!s.avg_split||!s.athlete) return;
      const parts = s.avg_split.split(':');
      if(parts.length!==2) return;
      const secs = parseFloat(parts[0])*60+parseFloat(parts[1]);
      if(!athleteSplits[s.athlete]||secs<athleteSplits[s.athlete].secs){
        athleteSplits[s.athlete]={secs, split:s.avg_split, type:s.workout_type, date:s.timestamp?.slice(0,10)};
      }
    });
    const ranked = Object.entries(athleteSplits)
      .sort((a,b)=>a[1].secs-b[1].secs)
      .slice(0,10);

    const rankBadge = (i) => {
      if(i===0) return '<span class="rank-badge rank-1">1</span>';
      if(i===1) return '<span class="rank-badge rank-2">2</span>';
      if(i===2) return '<span class="rank-badge rank-3">3</span>';
      return `<span class="rank-badge rank-other">${i+1}</span>`;
    };
    lbEl.innerHTML = `<table class="data-table"><thead><tr>
      <th>Rank</th><th>Athlete</th><th>Best Split /500m</th><th>Workout Type</th><th>Date</th>
    </tr></thead><tbody>${ranked.map(([ath,d],i)=>`
      <tr>
        <td>${rankBadge(i)}</td>
        <td><span class="athlete-name">${ath}</span></td>
        <td><span class="split-badge" style="font-size:15px">${d.split}</span></td>
        <td><span class="wt-badge wt-other">${d.type||'—'}</span></td>
        <td style="color:var(--muted);font-size:12px">${d.date||'—'}</td>
      </tr>`).join('')}</tbody></table>`;
  }

  // Distance bar chart
  if(athletes.length>0){
    setTimeout(()=>{
      const ctx=document.getElementById('ergDistChart')?.getContext('2d');
      if(!ctx) return;
      const colors=['#1a56db','#22c55e','#f59e0b','#e63946','#8b5cf6','#06b6d4','#ec4899','#10b981'];
      charts['ergDist']=new Chart(ctx,{
        type:'bar',
        data:{labels:sums.map(s=>s.athlete),datasets:[{label:'Distance (m)',data:sums.map(s=>s.total_distance||0),backgroundColor:sums.map((_,i)=>colors[i%colors.length]+'cc'),borderRadius:8}]},
        options:{responsive:true,plugins:{legend:{display:false}},scales:{
          y:{grid:{color:'#f0f4f8'},ticks:{font:{size:11},callback:v=>v>=1000?`${(v/1000).toFixed(0)}k`:v}},
          x:{grid:{display:false},ticks:{font:{size:12}}}
        }}
      });
    },100);
  }
}

let testingData=null;
let activeYearTab=null;

function renderTestingView(data){
  testingData=data;
  const yearGroups=data.yearGroups||[];

  if(yearGroups.length===0){
    document.getElementById('mainContent').innerHTML='<div class="empty">No testing data yet — collect results via the Testing form</div>';
    return;
  }

  activeYearTab=yearGroups[0].yearLevel;

  document.getElementById('mainContent').innerHTML=`
    <div class="section-title">Core Testing Results</div>
    <div class="stats-grid" style="margin-bottom:20px">
      <div class="stat-card green"><div class="stat-label">Year Groups</div><div class="stat-value">${yearGroups.length}</div><div class="stat-sub">Tested</div></div>
      <div class="stat-card"><div class="stat-label">Total Athletes</div><div class="stat-value">${yearGroups.reduce((a,g)=>a+g.athleteCount,0)}</div><div class="stat-sub">Records</div></div>
      <div class="stat-card purple"><div class="stat-label">Tests Conducted</div><div class="stat-value">4</div><div class="stat-sub">Metrics tracked</div></div>
    </div>
    <div class="year-tabs" id="yearTabs"></div>
    <div id="yearContent"></div>
  `;

  // Year tabs
  const tabsEl=document.getElementById('yearTabs');
  yearGroups.forEach(g=>{
    const btn=document.createElement('button');
    btn.className='year-tab'+(g.yearLevel===activeYearTab?' active':'');
    btn.textContent=`Year ${g.yearLevel}`;
    btn.onclick=()=>selectYearTab(g.yearLevel);
    tabsEl.appendChild(btn);
  });

  renderYearContent(activeYearTab);
}

function selectYearTab(yr){
  activeYearTab=yr;
  document.querySelectorAll('.year-tab').forEach(b=>{
    b.classList.toggle('active',b.textContent===`Year ${yr}`);
  });
  renderYearContent(yr);
}

function renderYearContent(yr){
  const group=(testingData.yearGroups||[]).find(g=>g.yearLevel===yr);
  if(!group){ document.getElementById('yearContent').innerHTML=''; return; }

  const {overallRanking, metricRankings}=group;
  const METRICS=[
    {key:'hollow_hold',label:'Hollow Hold',unit:'s'},
    {key:'prone_plank',label:'Prone Plank',unit:'s'},
    {key:'side_plank_left',label:'Side Plank Left',unit:'s'},
    {key:'side_plank_right',label:'Side Plank Right',unit:'s'},
  ];

  let html=`
    <div class="section-title">Overall Ranking — Year ${yr}</div>
    <div class="card" style="margin-bottom:20px">
      <table class="data-table">
        <thead><tr>
          <th>Rank</th><th>Athlete</th>
          ${METRICS.map(m=>`<th>${m.label}</th>`).join('')}
          <th>Tests</th><th>Avg Rank</th>
        </tr></thead>
        <tbody>
          ${overallRanking.map(a=>{
            const rankBadgeClass=a.overallRank===1?'rank-1':a.overallRank===2?'rank-2':a.overallRank===3?'rank-3':'rank-other';
            const scores=METRICS.map(m=>{
              const sc=a.scores[m.key];
              return `<td style="font-weight:700">${sc!=null?sc+m.unit:'—'}</td>`;
            }).join('');
            return `<tr>
              <td><span class="rank-badge ${rankBadgeClass}">${a.overallRank}</span></td>
              <td><span class="athlete-name">${a.athlete}</span></td>
              ${scores}
              <td style="color:var(--muted)">${a.testsCompleted}/4</td>
              <td style="color:var(--muted)">${a.avgRank}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>

    <div class="section-title">Metric Leaderboards — Year ${yr}</div>
    <div class="two-col">
      ${metricRankings.map(metric=>`
        <div class="card">
          <div class="card-title">${metric.label} (${metric.unit}) — higher is better</div>
          <table class="pb-table">
            <thead><tr><th>Rank</th><th>Athlete</th><th>Score</th></tr></thead>
            <tbody>
              ${metric.rankings.slice(0,10).map(r=>{
                const rankBadgeClass=r.rank===1?'rank-1':r.rank===2?'rank-2':r.rank===3?'rank-3':'rank-other';
                return `<tr>
                  <td><span class="rank-badge ${rankBadgeClass}">${r.rank}</span></td>
                  <td style="font-weight:700">${r.athlete}</td>
                  <td class="pb-val">${r.score}${metric.unit}</td>
                </tr>`;
              }).join('')}
              ${metric.rankings.length===0?'<tr><td colspan="3" style="color:var(--muted);text-align:center;padding:16px">No data</td></tr>':''}
            </tbody>
          </table>
        </div>
      `).join('')}
    </div>

    <div class="section-title">Visual Comparison — Year ${yr}</div>
    <div class="card">
      <div class="card-title">All metrics per athlete (seconds)</div>
      <canvas id="testingChart" height="100"></canvas>
    </div>
  `;

  document.getElementById('yearContent').innerHTML=html;

  // Radar/bar chart for all athletes in this year group
  setTimeout(()=>{
    const ctx=document.getElementById('testingChart')?.getContext('2d');
    if(!ctx) return;
    const athletes=overallRanking.map(a=>a.athlete);
    const colors=['#1a56db','#22c55e','#f59e0b','#e63946','#8b5cf6','#06b6d4'];
    charts['testing']=new Chart(ctx,{
      type:'bar',
      data:{
        labels:METRICS.map(m=>m.label),
        datasets:athletes.map((ath,i)=>({
          label:ath,
          data:METRICS.map(m=>{
            const a=overallRanking.find(r=>r.athlete===ath);
            return a?.scores[m.key]||0;
          }),
          backgroundColor:colors[i%colors.length]+'bb',
          borderRadius:5,
        }))
      },
      options:{responsive:true,interaction:{mode:'index',intersect:false},plugins:{legend:{labels:{font:{size:11},boxWidth:12}}},
        scales:{
          y:{grid:{color:'#f0f4f8'},ticks:{font:{size:11}},title:{display:true,text:'seconds',font:{size:11}}},
          x:{grid:{display:false},ticks:{font:{size:12}}}

      }

  },100);
}

// ATHLETE VIEW (coach's athlete drill-down)
// ═══════════════════════════════════════════════════
async function loadAthleteView(){
  const athlete=document.getElementById('athleteSelect')?.value;
  if(!athlete||athlete==='Loading…') return;
  destroyCharts();
  document.getElementById('mainContent').innerHTML='<div class="loading"><div class="spinner"></div> Loading athlete data…</div>';
  try{
    const data=await fetchData(API_SC,{view:'athlete',athlete});
    renderAthleteView(data);
  } catch(e){
    document.getElementById('mainContent').innerHTML=`<div class="empty">Error: ${e.message}</div>`;
  }
}

function renderAthleteView(data){
  const { athlete, exerciseProgressions, sessionHistory } = data;
  const logs = data.logs || [];
  const totalSets = logs.length;
  const sessions = (sessionHistory||[]).length;
  const rpeArr = logs.filter(r=>r.rpe).map(r=>r.rpe);
  const avgRpe = rpeArr.length ? (rpeArr.reduce((a,b)=>a+b,0)/rpeArr.length).toFixed(1) : '—';
  const latestACWR = data.latestACWR;
  const acwrVal = latestACWR?.acwr;
  const acwrStatVal = acwrVal ? acwrVal.toFixed(2) : '—';
  const acwrStatClass = !acwrVal?'':acwrVal<0.8?'':acwrVal<=1.3?'green':acwrVal<=1.5?'warn':'red';
  const acwrStatSub = !acwrVal?'Not enough data':acwrVal<0.8?'Under-training':acwrVal<=1.3?'Optimal zone':acwrVal<=1.5?'Caution':'⚠️ Danger zone';

  const pbMap={};
  logs.forEach(r=>{
    const load=parseFloat(r.load);
    if(!isNaN(load)&&load>0){
      if(!pbMap[r.exercise]||load>pbMap[r.exercise].load)
        pbMap[r.exercise]={load,date:r.timestamp?.slice(0,10),reps:r.reps};
    }
  });
  const pbs=Object.entries(pbMap).sort((a,b)=>b[1].load-a[1].load);

  const weeklyVol=[];
  const now=new Date();
  for(let w=5;w>=0;w--){
    const wStart=new Date(now);wStart.setDate(now.getDate()-(w+1)*7);
    const wEnd=new Date(now);wEnd.setDate(now.getDate()-w*7);
    const wLogs=logs.filter(r=>{const d=new Date(r.timestamp);return d>=wStart&&d<wEnd;});
    const vol=wLogs.reduce((a,r)=>{const l=parseFloat(r.load);return a+(isNaN(l)?0:l*(r.reps||1));},0);
    weeklyVol.push({week:`W-${w}`,vol:Math.round(vol)});
  }
  weeklyVol[weeklyVol.length-1].week='This wk';

  document.getElementById('mainContent').innerHTML=`
    <div class="section-title">Overview — ${athlete}</div>
    <div class="stats-grid">
      <div class="stat-card green"><div class="stat-label">Sessions</div><div class="stat-value">${sessions}</div><div class="stat-sub">Total logged</div></div>
      <div class="stat-card"><div class="stat-label">Total Sets</div><div class="stat-value">${totalSets}</div><div class="stat-sub">All exercises</div></div>
      <div class="stat-card warn"><div class="stat-label">Avg RPE</div><div class="stat-value">${avgRpe}</div><div class="stat-sub">All sets</div></div>
      <div class="stat-card ${acwrStatClass}"><div class="stat-label">Current ACWR</div><div class="stat-value">${acwrStatVal}</div><div class="stat-sub">${acwrStatSub}</div></div>
      <div class="stat-card"><div class="stat-label">PBs Tracked</div><div class="stat-value">${pbs.length}</div><div class="stat-sub">Exercises with load</div></div>
    </div>

    <div class="two-col" style="margin-top:20px">
      <div>
        <div class="section-title">Personal Bests</div>
        <div class="card">
          <table class="pb-table">
            <thead><tr><th>Exercise</th><th>Best Load</th><th>Reps</th><th>Trend</th><th>Date</th></tr></thead>
            <tbody id="pbBody"></tbody>
          </table>
        </div>
      </div>
      <div>
        <div class="section-title">Weekly Volume (Tonnage)</div>
        <div class="card">
          <div class="card-title">kg × reps — last 6 weeks</div>
          <canvas id="volChart" height="140"></canvas>
        </div>
      </div>
    </div>

    <div class="section-title">ACWR — Acute:Chronic Workload Ratio</div>
    <div class="card">
      <div class="card-title">Rolling 7-day (acute) ÷ 28-day (chronic) daily volume — optimal: 0.8–1.3</div>
      <canvas id="athleteACWRChart" height="80"></canvas>
    </div>

    <div class="section-title">Session History</div>
    <div class="card">
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px">Click any session to view full set-by-set detail</div>
      <table class="data-table">
        <thead><tr><th>Date</th><th>Session</th><th>Exercises (in order)</th><th>Sets</th><th>Avg RPE</th><th>Volume</th><th>PB?</th><th></th></tr></thead>
        <tbody id="historyBody"></tbody>
      </table>
    </div>

    <div class="section-title">Exercise Progressions — Load & RPE</div>
    <div class="exercise-grid" id="exerciseGrid"></div>
  `;

  // PBs with trend arrows
  const pbBody=document.getElementById('pbBody');
  if(pbs.length===0){
    pbBody.innerHTML='<tr><td colspan="5" style="color:var(--muted);text-align:center;padding:20px">No load data yet</td></tr>';
  } else {
    // Build last-3-session loads per exercise for trends
    const exLoads={};
    logs.forEach(r=>{
      const load=parseFloat(r.load);
      if(!isNaN(load)&&load>0){
        if(!exLoads[r.exercise]) exLoads[r.exercise]=[];
        exLoads[r.exercise].push({load,date:r.timestamp?.slice(0,10)||''});
      }
    });
    // Sort by date and get last 3
    Object.keys(exLoads).forEach(ex=>{
      exLoads[ex].sort((a,b)=>b.date.localeCompare(a.date));
    });

    pbs.slice(0,10).forEach(([ex,pb],i)=>{
      const recentLoads=(exLoads[ex]||[]).slice(0,3).map(r=>r.load);
      let trend='';
      if(recentLoads.length<2){
        trend='<span class="trend-new">NEW</span>';
      } else {
        const diff=recentLoads[0]-recentLoads[1];
        if(diff>0) trend=`<span class="trend-up">↑ +${diff.toFixed(1)}kg</span>`;
        else if(diff<0) trend=`<span class="trend-down">↓ ${diff.toFixed(1)}kg</span>`;
        else trend=`<span class="trend-flat">→ Flat</span>`;
      }
      const isPB=recentLoads.length>=1&&recentLoads[0]>=pb.load;
      const tr=document.createElement('tr');
      tr.innerHTML=`<td style="font-size:11px;font-weight:600">${i===0?'<span class="pb-crown">🏆</span>':''}${ex}${isPB?'<span class="pb-pill">PB</span>':''}</td><td class="pb-val">${pb.load}kg</td><td style="color:var(--muted)">${pb.reps||'—'}</td><td>${trend}</td><td style="color:var(--muted);font-size:12px">${pb.date||'—'}</td>`;
      pbBody.appendChild(tr);
    });
  }

  // Volume chart
  setTimeout(()=>{
    const vCtx=document.getElementById('volChart')?.getContext('2d');
    if(vCtx){
      charts['vol']=new Chart(vCtx,{
        type:'bar',
        data:{labels:weeklyVol.map(w=>w.week),datasets:[{label:'Volume (kg×reps)',data:weeklyVol.map(w=>w.vol),backgroundColor:weeklyVol.map((_,i)=>i===5?'rgba(30,144,255,.85)':'rgba(30,144,255,.3)'),borderRadius:6}]},
        options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{grid:{color:'#f0f4f8'},ticks:{font:{size:11}}},x:{grid:{display:false},ticks:{font:{size:11}}}}}
      });
    }

    // ACWR chart
    const acwrSeries=data.acwrSeries||[];
    if(acwrSeries.length>0){
      renderACWRChart('athleteACWRChart',null,acwrSeries);
    }
  },50);

  // Session history
  const hBody=document.getElementById('historyBody');
  (sessionHistory||[]).forEach(s=>{
    const cls=s.session_type==='Lower A'?'sb-la':s.session_type==='Lower B'?'sb-lb':s.session_type==='Upper A'?'sb-ua':'sb-ub';
    const rpeClass=(s.avgRpe||0)>=8.5?'rpe-high':(s.avgRpe||0)>=7.5?'rpe-mid':'rpe-low';
    const exList=s.exercises.slice(0,4).join(', ')+(s.exercises.length>4?` +${s.exercises.length-4}`:'');
    const tr=document.createElement('tr');
    tr.className='clickable-row';
    tr.onclick=()=>openGymSession(athlete, s.date, s.session_type);
    tr.title='Click to view full session';
    // PB detection: check if this session has the highest total load in history
    const prevSessions = (sessionHistory||[]).filter(ss => ss.date < s.date);
    const maxPrevLoad = prevSessions.length ? Math.max(...prevSessions.map(ss => ss.totalLoad||0)) : 0;
    const isPBSession = s.totalLoad > 0 && s.totalLoad > maxPrevLoad && prevSessions.length > 0;
    tr.innerHTML=`<td style="font-weight:600">${s.date}</td><td><span class="session-badge ${cls}">${s.session_type}</span></td><td style="color:var(--muted);font-size:12px">${exList}</td><td style="font-weight:600">${s.totalSets}</td><td><span class="rpe-badge ${rpeClass}">${s.avgRpe||'—'}</span></td><td style="font-size:12px;color:var(--muted)">${s.totalLoad>0?s.totalLoad.toLocaleString()+'kg':'—'}</td><td>${isPBSession?'<span style="background:#fef3c7;color:#92400e;border-radius:10px;font-size:10px;font-weight:800;padding:2px 7px">🏆 PB</span>':''}</td><td style="color:var(--accent);font-size:11px;font-weight:600">View →</td>`;
    hBody.appendChild(tr);
  });

  // Exercise progression charts
  const grid=document.getElementById('exerciseGrid');
  const validEps=(exerciseProgressions||[]).filter(ep=>ep.points.length>=1);
  if(validEps.length===0){grid.innerHTML='<div class="empty">No exercise data yet</div>';return;}
  validEps.forEach((ep,idx)=>{
    const div=document.createElement('div');div.className='ex-card';
    const cid=`ex_${idx}`;
    div.innerHTML=`<div class="ex-card-title">${ep.exercise}</div><canvas id="${cid}" height="120"></canvas>`;
    grid.appendChild(div);
    setTimeout(()=>{
      const ctx=document.getElementById(cid)?.getContext('2d');
      if(!ctx) return;
      const hasLoad=ep.points.some(p=>p.avgLoad!==null);
      charts[cid]=new Chart(ctx,{
        type:'line',
        data:{labels:ep.points.map(p=>p.date.slice(5)),datasets:[
          ...(hasLoad?[{label:'Load (kg)',data:ep.points.map(p=>p.avgLoad),borderColor:'#1e90ff',backgroundColor:'rgba(30,144,255,.07)',borderWidth:2,pointRadius:4,fill:true,tension:.4,yAxisID:'y'}]:[]),
          {label:'RPE',data:ep.points.map(p=>p.avgRpe),borderColor:'#ff6b35',borderWidth:2,borderDash:[4,3],pointRadius:3,fill:false,tension:.4,yAxisID:hasLoad?'y2':'y'}
        ]},
        options:{responsive:true,interaction:{mode:'index',intersect:false},plugins:{legend:{display:ep.points.length>1,labels:{font:{size:10},boxWidth:10}}},
          scales:{
            y:{position:'left',grid:{color:'#f0f4f8'},ticks:{font:{size:10}},title:{display:hasLoad,text:'kg',font:{size:10}}},
            ...(hasLoad?{y2:{position:'right',grid:{drawOnChartArea:false},ticks:{font:{size:10}},title:{display:true,text:'RPE',font:{size:10}}}}:{})
          }
        }
      });
    },60*idx+100);
  });
}

// ── COACH NOTES ───────────────────────────────────────────────────────
let _currentNoteContext = { athlete: '', session_date: '', session_type: '' };

async function loadCoachNotes(athlete, session_date, session_type) {
  _currentNoteContext = { athlete, session_date, session_type };
  const listEl = document.getElementById('coachNotesList');
  if (!listEl) return;
  listEl.textContent = 'Loading…';
  try {
    const res = await fetchData('https://superagent-84188511.base44.app/functions/coachNote', { action: 'list', athlete });
    const notes = res.notes || [];
    const sessionNotes = notes.filter(n => n.session_date === session_date);
    const allNotes = notes.slice(0, 5);
    if (!allNotes.length) {
      listEl.innerHTML = '<span style="color:var(--muted);font-style:italic">No notes yet for this athlete</span>';
      return;
    }
    const flagColors = { positive: '#22c55e', fatigue: '#f59e0b', technique: '#3b82f6', injury: '#e63946', monitor: '#8b5cf6', none: '#94a3b8' };
    const flagLabels = { positive: '✅', fatigue: '😓', technique: '🎯', injury: '🚨', monitor: '👁', none: '' };
    listEl.innerHTML = allNotes.map(n => `
      <div style="background:#f8faff;border-left:3px solid ${flagColors[n.flag]||'#94a3b8'};padding:8px 12px;border-radius:0 8px 8px 0;margin-bottom:6px">
        <span style="font-size:11px;color:var(--muted)">${n.session_date} ${flagLabels[n.flag]||''}</span>
        <div style="font-size:13px;font-weight:600;color:var(--navy);margin-top:2px">${n.note}</div>
      </div>`).join('');
  } catch(e) {
    listEl.textContent = 'Could not load notes';
  }
}

async function saveCoachNote() {
  const input = document.getElementById('coachNoteInput');
  const flag = document.getElementById('coachNoteFlag').value;
  const note = input?.value?.trim();
  if (!note) return;
  const { athlete, session_date, session_type } = _currentNoteContext;
  input.disabled = true;
  try {
    await fetchData('https://superagent-84188511.base44.app/functions/coachNote', { athlete, session_date, session_type, note, flag });
    input.value = '';
    document.getElementById('coachNoteFlag').value = 'none';
    await loadCoachNotes(athlete, session_date, session_type);
  } catch(e) { alert('Error saving note'); }
  input.disabled = false;
}

// Open a GYM session detail modal
async function openGymSession(athlete, date, session_type){
  const modal = document.getElementById('sessionModal');
  const scls = session_type==='Lower A'?'sb-la':session_type==='Lower B'?'sb-lb':session_type==='Upper A'?'sb-ua':'sb-ub';
  document.getElementById('modalTitle').innerHTML = `<span class="session-badge ${scls}" style="font-size:14px;padding:3px 10px">${session_type}</span>`;
  document.getElementById('modalSubtitle').textContent = `${athlete} · ${date}`;
  document.getElementById('modalStats').innerHTML = '<div class="modal-stat"><div class="modal-stat-val"><div class="spinner" style="margin:0 auto"></div></div><div class="modal-stat-lbl">Loading</div></div>';
  document.getElementById('modalBody').innerHTML = '';
  modal.classList.remove('hidden');

  try {
    const data = await fetchData('https://superagent-84188511.base44.app/functions/getSessionDetail', {athlete, date, session_type});
    const s = data.session_detail;
    if(!s){ document.getElementById('modalBody').innerHTML='<div class="empty">No data found</div>'; return; }

    // Stats bar
    const rpeClass = (s.avg_rpe||0)>=8.5?'rpe-high':(s.avg_rpe||0)>=7.5?'rpe-mid':'rpe-low';
    document.getElementById('modalStats').innerHTML = `
      <div class="modal-stat"><div class="modal-stat-val">${s.exercises.length}</div><div class="modal-stat-lbl">Exercises</div></div>
      <div class="modal-stat"><div class="modal-stat-val">${s.total_sets}</div><div class="modal-stat-lbl">Total Sets</div></div>
      <div class="modal-stat"><div class="modal-stat-val">${s.avg_rpe ? '<span class="rpe-badge '+rpeClass+'">'+s.avg_rpe+'</span>' : '—'}</div><div class="modal-stat-lbl">Avg RPE</div></div>
      <div class="modal-stat"><div class="modal-stat-val" style="font-size:16px">${s.total_load>0?s.total_load.toLocaleString()+'kg':'—'}</div><div class="modal-stat-lbl">Volume</div></div>
    `;

    // Exercise table blocks — one table per exercise, sets as rows
    let bodyHtml = '<div class="modal-section"><div class="modal-section-title">Exercises — in order performed</div>';
    s.exercises.forEach((ex, exIdx) => {
      const hasLoad = ex.sets.some(st => st.load && st.load !== '—' && st.load !== null);
      const hasRpe  = ex.sets.some(st => st.rpe);
      bodyHtml += `
        <div class="ex-block" style="margin-bottom:10px">
          <div class="ex-block-name" style="display:flex;align-items:center;gap:8px">
            <span style="background:var(--navy);color:#fff;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0">${exIdx+1}</span>
            ${ex.name}
          </div>
          <table style="width:100%;border-collapse:collapse;margin-top:8px">
            <thead>
              <tr style="border-bottom:2px solid var(--border)">
                <th style="text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);padding:4px 8px">Set</th>
                ${hasLoad ? '<th style="text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);padding:4px 8px">Weight</th>' : ''}
                <th style="text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);padding:4px 8px">Reps</th>
                ${hasRpe ? '<th style="text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);padding:4px 8px">RPE</th>' : ''}
              </tr>
            </thead>
            <tbody>
              ${ex.sets.map((st, i) => {
                const load = st.load && st.load !== '—' && st.load !== null ? st.load : null;
                const rpe = st.rpe || null;
                const rpeClass = (rpe||0)>=8.5?'rpe-high':(rpe||0)>=7.5?'rpe-mid':'rpe-low';
                return `<tr style="border-bottom:1px solid var(--border)">
                  <td style="padding:7px 8px;font-size:13px;font-weight:700;color:var(--muted)">Set ${i+1}</td>
                  ${hasLoad ? `<td style="padding:7px 8px;text-align:right;font-size:14px;font-weight:800;color:var(--navy)">${load ? load+'<span style="font-size:11px;color:var(--muted)">kg</span>' : '—'}</td>` : ''}
                  <td style="padding:7px 8px;text-align:right;font-size:14px;font-weight:800;color:var(--navy)">${st.reps || '—'}</td>
                  ${hasRpe ? `<td style="padding:7px 8px;text-align:right">${rpe ? '<span class="rpe-badge '+rpeClass+'">'+rpe+'</span>' : '—'}</td>` : ''}
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>`;
    });
    bodyHtml += '</div>';
    document.getElementById('modalBody').innerHTML = bodyHtml;

  } catch(e) {
    document.getElementById('modalBody').innerHTML = `<div class="empty">Error: ${e.message}</div>`;
  }
  // Always load coach notes (even if session detail fails)
  loadCoachNotes(athlete, date, session_type);
}

// Open an ERG session detail modal
function openErgSession(session){
  const modal = document.getElementById('sessionModal');
  const date = session.timestamp?.slice(0,10) || '—';

  document.getElementById('modalTitle').innerHTML = `🚣 ${session.workout_type||'Erg Session'}`;
  document.getElementById('modalSubtitle').textContent = `${session.athlete} · ${date}`;

  // Stats bar
  const dist = session.total_distance ? (session.total_distance>=1000?(session.total_distance/1000).toFixed(2)+'km':session.total_distance+'m') : '—';
  const rpeClass = (session.rpe||0)>=8.5?'rpe-high':(session.rpe||0)>=7.5?'rpe-mid':'rpe-low';
  document.getElementById('modalStats').innerHTML = `
    <div class="modal-stat"><div class="modal-stat-val" style="font-size:16px">${dist}</div><div class="modal-stat-lbl">Distance</div></div>
    <div class="modal-stat"><div class="modal-stat-val" style="font-family:monospace;font-size:18px">${session.total_time||'—'}</div><div class="modal-stat-lbl">Time</div></div>
    <div class="modal-stat"><div class="modal-stat-val" style="font-family:monospace;color:var(--accent);font-size:18px">${session.avg_split||'—'}</div><div class="modal-stat-lbl">Avg Split</div></div>
    <div class="modal-stat"><div class="modal-stat-val">${session.rpe?'<span class="rpe-badge '+rpeClass+'">'+session.rpe+'</span>':'—'}</div><div class="modal-stat-lbl">RPE</div></div>
  `;

  // Body
  let bodyHtml = '<div class="modal-section"><div class="modal-section-title">Session Details</div>';
  bodyHtml += '<div class="erg-detail-grid">';
  const details = [
    {label:'Stroke Rate', value: session.stroke_rate ? session.stroke_rate+' spm' : '—'},
    {label:'Avg Heart Rate', value: session.avg_heart_rate ? session.avg_heart_rate+' bpm' : '—'},
    {label:'Workout Type', value: session.workout_type||'—'},
    {label:'Date', value: date},
  ];
  details.forEach(d => {
    bodyHtml += `<div class="erg-detail-item"><div class="erg-detail-label">${d.label}</div><div class="erg-detail-value">${d.value}</div></div>`;
  });
  bodyHtml += '</div></div>';

  // ── Interval description pill ──────────────────────────────────────
  if(session.intervals){
    bodyHtml += `<div class="modal-section"><div class="modal-section-title">Interval Structure</div><div class="intervals-box">${session.intervals}</div></div>`;
  }

  // ── Per-interval splits table ──────────────────────────────────────
  let splits = [];
  if (session.interval_splits) {
    try { splits = JSON.parse(session.interval_splits); } catch(e) { splits = []; }
  }
  if (splits.length > 0) {
    const hasHr = splits.some(s => s.heart_rate);
    const hasSr = splits.some(s => s.stroke_rate);
    bodyHtml += `<div class="modal-section"><div class="modal-section-title">Per-Interval Splits</div>
      <table class="interval-splits-table">
        <thead><tr>
          <th>#</th>
          <th>Distance</th>
          <th>Time</th>
          <th>Split /500m</th>
          ${hasSr ? '<th>S/R</th>' : ''}
          ${hasHr ? '<th>HR</th>' : ''}
        </tr></thead>
        <tbody>
          ${splits.map((s,i) => {
            const n = s.interval ?? i+1;
            const dist = s.distance ? s.distance+'m' : '—';
            const time = s.time || '—';
            const split = s.split || '—';
            return `<tr>
              <td><span class="int-num">${n}</span></td>
              <td>${dist}</td>
              <td style="font-family:monospace">${time}</td>
              <td class="split-val">${split}</td>
              ${hasSr ? `<td>${s.stroke_rate ? s.stroke_rate+' spm' : '—'}</td>` : ''}
              ${hasHr ? `<td>${s.heart_rate ? s.heart_rate+' bpm' : '—'}</td>` : ''}
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
  }

  // ── Notes ──────────────────────────────────────────────────────────
  if(session.notes){
    bodyHtml += `<div class="modal-section"><div class="modal-section-title">Notes</div><div class="erg-notes">${session.notes}</div></div>`;
  }

  // ── Session image ──────────────────────────────────────────────────
  if(session.image_url){
    bodyHtml += `<div class="modal-section"><div class="modal-section-title">Session Image</div><img src="${session.image_url}" style="width:100%;border-radius:10px;margin-top:4px" /></div>`;
  }

  document.getElementById('modalBody').innerHTML = bodyHtml;
  modal.classList.remove('hidden');
}

    <div class="stats-grid">
      <div class="stat-card green"><div class="stat-label">Total Sessions</div><div class="stat-value">${total}</div><div class="stat-sub">All logged</div></div>
      <div class="stat-card"><div class="stat-label">Athletes</div><div class="stat-value">${sums.length}</div><div class="stat-sub">With water data</div></div>
      <div class="stat-card"><div class="stat-label">Best Split</div><div class="stat-value" style="font-size:18px;font-family:monospace">${lb[0]?.split||'—'}</div><div class="stat-sub">${lb[0]?.athlete||''}</div></div>
    </div>

    ${lb.length>0?`
    <div class="section-title">Best Splits — Leaderboard</div>
    <div class="card">
      <table class="data-table">
        <thead><tr><th>Rank</th><th>Athlete</th><th>Best Split /500m</th><th>Session Type</th><th>Date</th></tr></thead>
        <tbody>${lb.map((r,i)=>`<tr>
          <td>${rankBadge(i)}</td>
          <td><span class="athlete-name">${r.athlete}</span></td>
          <td><span style="font-family:monospace;font-size:16px;font-weight:800;color:var(--accent)">${r.split}</span></td>
          <td><span style="font-size:12px;color:var(--muted)">${r.type||'—'}</span></td>
          <td style="font-size:12px;color:var(--muted)">${r.date||'—'}</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`:''}

    <div class="section-title">Athlete Summary</div>
    <div class="card">
      ${sums.length===0?'<div class="empty">No on-water data yet — athletes can log sessions via the Athlete Hub</div>':`
      <table class="data-table">
        <thead><tr><th>Athlete</th><th>Sessions</th><th>Total Distance</th><th>Avg RPE</th><th>Last Session</th><th>Types</th></tr></thead>
        <tbody>${sums.map(a=>`<tr>
          <td><span class="athlete-name">${a.athlete}</span></td>
          <td style="font-weight:700">${a.sessions}</td>
          <td style="font-size:13px">${a.totalDistance>=1000?(a.totalDistance/1000).toFixed(1)+'km':a.totalDistance+'m'}</td>
          <td><span class="rpe-badge ${(a.avgRpe||0)>=8.5?'rpe-high':(a.avgRpe||0)>=7.5?'rpe-mid':'rpe-low'}">${a.avgRpe||'—'}</span></td>
          <td style="font-size:12px;color:var(--muted)">${a.lastDate||'—'}</td>
          <td style="font-size:11px;color:var(--muted)">${(a.sessionTypes||[]).join(', ')}</td>
        </tr>`).join('')}</tbody>
      </table>`}
    </div>

    <div class="section-title">Recent Sessions</div>
    <div class="card">
      ${sessions.length===0?'<div class="empty">No sessions logged yet</div>':`
      <table class="data-table">
        <thead><tr><th>Date</th><th>Athlete</th><th>Type</th><th>Boat</th><th>Distance</th><th>Split /500m</th><th>RPE</th><th>Conditions</th></tr></thead>
        <tbody>${sessions.map(s=>`<tr>
          <td style="font-weight:700">${s.timestamp?.slice(0,10)||'—'}</td>
          <td><span class="athlete-name">${s.athlete||'—'}</span></td>
          <td><span style="background:#0c4a6e;color:#7dd3fc;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700">${s.session_type||'—'}</span></td>
          <td style="font-size:12px;color:var(--muted)">${s.boat_type||'—'}</td>
          <td style="font-size:13px">${s.distance?s.distance.toLocaleString()+'m':'—'}</td>
          <td style="font-family:monospace;color:var(--accent);font-weight:700">${s.avg_split||'—'}</td>
          <td><span class="rpe-badge ${(s.rpe||0)>=8.5?'rpe-high':(s.rpe||0)>=7.5?'rpe-mid':'rpe-low'}">${s.rpe||'—'}</span></td>
          <td style="font-size:11px;color:var(--muted)">${s.conditions||'—'}</td>
        </tr>`).join('')}</tbody>
      </table>`}
    </div>

    <div style="text-align:center;padding:16px 0;font-size:13px;color:var(--muted)">
      Athletes log water sessions via the <a href="athlete.html" target="_blank" style="color:var(--accent);font-weight:700">Athlete Hub → 🌊 Water</a> tab
    </div>
  `;
}

// ═══════════════════════════════════════════════════
// CSV EXPORT
// ═══════════════════════════════════════════════════
function exportCSV(){
  if(!coachData) return;
  const sums = coachData.athlete_summaries||[];
  const rows = [['Athlete','Sessions','Avg RPE','High RPE Sets','ACWR','Weekly Load','Days Since Last','Last Session']];
  sums.forEach(a=>{
    rows.push([
      a.athlete,
      a.total_sessions||0,
      a.avg_rpe||'',
      a.high_rpe_sets||0,
      a.acwr?a.acwr.toFixed(2):'',
      a.weekly_load||0,
      a.days_since_last!==null?a.days_since_last:'',
      a.last_session_date||''
    ]);
  });
  const csv = rows.map(r=>r.map(v=>JSON.stringify(v??'')).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`cranbrook_sc_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

// ═══════════════════════════════════════════════════
// WEBHOOK HEALTH CHECK
// ═══════════════════════════════════════════════════
// Checked once on init — if data is older than 8h, show stale warning
function checkDataFreshness(data){
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  if(!dot||!txt) return;
  // Use the most recent session timestamp across all athletes as freshness proxy
  const sums = data.athlete_summaries||[];
  const minDays = sums.length ? Math.min(...sums.filter(a=>a.days_since_last!==null).map(a=>a.days_since_last)) : null;
  if(minDays===null){
    dot.className='sync-dot'; txt.textContent='No data';
  } else if(minDays>1){
    dot.className='sync-dot stale'; txt.textContent=`Data: ${minDays}d old`;
  } else {
    dot.className='sync-dot fresh'; txt.textContent='Data up to date';
  }
  lastSyncedAt = new Date();
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
async function init(){
  try{
    coachData=await fetchData(API_SC,{view:'coach'});
    if(coachData.athletes?.length>0){
      const sel=document.getElementById('athleteSelect');
      sel.innerHTML=coachData.athletes.map(a=>`<option value="${a}">${a}</option>`).join('');
    }
    checkDataFreshness(coachData);
    document.getElementById('csvBtn').style.display='flex';
    renderCoachView(coachData);
  } catch(e){
    document.getElementById('mainContent').innerHTML=`<div class="empty">Failed to load: ${e.message}</div>`;
    const dot=document.getElementById('syncDot');
    if(dot){ dot.className='sync-dot stale'; document.getElementById('syncText').textContent='Load failed'; }
  }
}

init();
</script>
