<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Cranbrook Rowing — Core Testing</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --navy:#07122b;--navy2:#0c1f48;--navy3:#102460;
      --blue:#1a56db;--sky:#3b82f6;--sky-lt:#93c5fd;
      --warn:#f59e0b;--red:#dc2626;--green:#22c55e;
      --bg:#eef2f9;--card:#fff;--text:#07122b;--muted:#5a6a8a;--border:#d0daf0;
    }
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}
    .hdr{background:var(--navy);position:sticky;top:0;z-index:300;box-shadow:0 2px 20px rgba(0,0,0,.4)}
    .hdr-inner{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:56px}
    .brand{display:flex;align-items:center;gap:10px}
    .logo img{width:36px;height:36px;object-fit:contain}
    .brand-name{font-size:15px;font-weight:800;color:#fff}
    .brand-sub{font-size:11px;color:#8fa0be}
    .back-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:4px}
    .back-btn:hover{background:rgba(255,255,255,.2)}

    .wrap{padding:16px;max-width:600px;margin:0 auto}
    .sec{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin:24px 0 10px}
    .sec:first-child{margin-top:0}
    .card{background:var(--card);border-radius:14px;padding:20px;box-shadow:0 1px 6px rgba(0,0,0,.07);margin-bottom:14px}
    .card-title{font-size:16px;font-weight:800;color:var(--navy);margin-bottom:4px}
    .card-sub{font-size:13px;color:var(--muted);margin-bottom:16px}

    .field{margin-bottom:14px}
    .field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:6px}
    .field select,.field input{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:10px;font-size:16px;font-weight:600;color:var(--text);background:#fff;outline:none;transition:border .2s;-webkit-appearance:none}
    .field select:focus,.field input:focus{border-color:var(--blue)}
    .field .hint{font-size:11px;color:var(--muted);margin-top:5px}

    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}

    .test-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:8px}
    .test-item{background:#f8faff;border:2px solid var(--border);border-radius:12px;padding:14px;text-align:center;transition:border .2s}
    .test-item:focus-within{border-color:var(--blue)}
    .test-item label{display:block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:8px}
    .test-item input{width:100%;border:none;background:transparent;font-size:24px;font-weight:800;color:var(--navy);text-align:center;outline:none}
    .test-item .unit{font-size:11px;color:var(--muted);margin-top:2px}

    .btn{display:block;width:100%;padding:16px;border:none;border-radius:12px;font-size:16px;font-weight:800;cursor:pointer;transition:all .2s;text-align:center;-webkit-tap-highlight-color:transparent}
    .btn-primary{background:var(--blue);color:#fff}
    .btn-primary:hover{background:#1244c0}
    .btn-primary:active{transform:scale(.98)}
    .btn-secondary{background:var(--bg);color:var(--navy);border:2px solid var(--border)}
    .btn:disabled{opacity:.5;cursor:not-allowed}

    .success-card{background:linear-gradient(135deg,#f0fff4,#e8f5e9);border:2px solid var(--green);border-radius:16px;padding:24px;text-align:center;display:none}
    .success-card .icon{font-size:48px;margin-bottom:12px}
    .success-card h3{font-size:20px;font-weight:800;color:#1a7a3c;margin-bottom:8px}
    .success-card p{font-size:14px;color:#2d6a4f}

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:12px 24px;border-radius:30px;font-size:14px;font-weight:700;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.3);transition:opacity .3s;pointer-events:none}
    .toast.hidden{opacity:0}

    .athlete-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:4px}
    .ath-btn{padding:14px 0;background:var(--bg);border:2px solid var(--border);border-radius:12px;font-size:16px;font-weight:800;color:var(--navy);cursor:pointer;transition:all .18s;text-align:center}
    .ath-btn:hover,.ath-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
    .ath-btn.active{box-shadow:0 2px 12px rgba(26,86,219,.4)}
    .yr-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .yr-btn{padding:12px 0;background:var(--bg);border:2px solid var(--border);border-radius:10px;font-size:15px;font-weight:800;color:var(--navy);cursor:pointer;transition:all .18s;text-align:center}
    .yr-btn:hover,.yr-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}

    @media(max-width:400px){
      .two-col,.test-grid{grid-template-columns:1fr}
      .athlete-grid{grid-template-columns:repeat(2,1fr)}
    }
  </style>
</head>
<body>

<div class="toast hidden" id="toast"></div>

<header class="hdr">
  <div class="hdr-inner">
    <div class="brand">
      <div class="logo"><img src="https://media.base44.com/images/public/6a2139cf1719e3fb84188511/dbd88bf6d_Cranbrooklogo.jpg" alt="Cranbrook"/></div>
      <div>
        <div class="brand-name">Cranbrook Rowing</div>
        <div class="brand-sub">Core Testing Entry</div>
      </div>
    </div>
    <a class="back-btn" href="athlete.html">← Hub</a>
  </div>
</header>

<div class="wrap">

  <!-- SUCCESS STATE -->
  <div class="success-card" id="successCard">
    <div class="icon">✅</div>
    <h3>Testing data saved!</h3>
    <p id="successMsg">Results recorded for the leaderboard.</p>
    <br/>
    <button class="btn btn-secondary" onclick="resetForm()" style="margin-top:8px">Enter another athlete</button>
  </div>

  <!-- FORM -->
  <div id="formWrap">
    <p class="sec">Athlete Details</p>
    <div class="card">
      <div class="card-title">Who's being tested?</div>
      <div class="two-col" style="margin-bottom:0">
        <div class="field">
          <label>First Name</label>
          <input type="text" id="athleteFirst" placeholder="First name" autocomplete="off" style="text-transform:capitalize"/>
        </div>
        <div class="field">
          <label>Last Name</label>
          <input type="text" id="athleteLast" placeholder="Last name" autocomplete="off" style="text-transform:capitalize"/>
        </div>
      </div>

      <div class="field">
        <label>Year Level</label>
        <div class="yr-grid">
          <button class="yr-btn" onclick="setYear('9')">Year 9</button>
          <button class="yr-btn" onclick="setYear('10')">Year 10</button>
          <button class="yr-btn" onclick="setYear('11')">Year 11</button>
          <button class="yr-btn" onclick="setYear('12')">Year 12</button>
        </div>
        <input type="hidden" id="yearLevel"/>
      </div>
    </div>

    <p class="sec">Anthropometrics</p>
    <div class="card">
      <div class="two-col">
        <div class="field">
          <label>Height (cm)</label>
          <input type="number" id="height" inputmode="decimal" placeholder="cm"/>
        </div>
        <div class="field">
          <label>Weight (kg)</label>
          <input type="number" id="weight" inputmode="decimal" placeholder="kg"/>
        </div>
      </div>
    </div>

    <p class="sec">Core Testing Results <span style="font-weight:400;text-transform:none;letter-spacing:0">(seconds — leave blank if not tested)</span></p>
    <div class="card">
      <div class="test-grid">
        <div class="test-item">
          <label>Hollow Hold</label>
          <input type="number" id="hollowHold" inputmode="decimal" placeholder="—"/>
          <div class="unit">seconds</div>
        </div>
        <div class="test-item">
          <label>Prone Plank</label>
          <input type="number" id="pronePlank" inputmode="decimal" placeholder="—"/>
          <div class="unit">seconds</div>
        </div>
        <div class="test-item">
          <label>Side Plank Left</label>
          <input type="number" id="sidePlankLeft" inputmode="decimal" placeholder="—"/>
          <div class="unit">seconds</div>
        </div>
        <div class="test-item">
          <label>Side Plank Right</label>
          <input type="number" id="sidePlankRight" inputmode="decimal" placeholder="—"/>
          <div class="unit">seconds</div>
        </div>
      </div>
      <div class="hint" style="margin-top:4px;font-size:11px;color:var(--muted)">Record best attempt only</div>
    </div>

    <button class="btn btn-primary" id="submitBtn" onclick="submitTesting()">Save Results →</button>
  </div>

</div>

<script>
const API = 'https://superagent-84188511.base44.app/functions/submitTesting';

let selectedYear = null;

// Athlete name entered via first/last name text fields

function setYear(yr) {
  document.querySelectorAll('.yr-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  selectedYear = yr;
  document.getElementById('yearLevel').value = yr;
}

function showToast(msg, duration = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), duration);
}

async function api(endpoint, data) {
  const res = await fetch(endpoint, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data),
  });
  return res.json();
}

async function submitTesting() {
  const athleteFirst = document.getElementById('athleteFirst').value.trim();
  const athleteLast = document.getElementById('athleteLast').value.trim();
  const athleteName = [athleteFirst, athleteLast].filter(Boolean).join(' ');
  const yearLevel = document.getElementById('yearLevel').value;

  if (!athleteFirst) { showToast('⚠️ Enter athlete first name'); return; }
  if (!yearLevel) { showToast('⚠️ Select a year level'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '⏳ Saving…';

  const payload = {
    athlete_name: athleteName,
    athlete_first: athleteFirst,
    athlete_last: athleteLast,
    year_level: yearLevel,
    height: document.getElementById('height').value || null,
    weight: document.getElementById('weight').value || null,
    hollow_hold: document.getElementById('hollowHold').value || null,
    prone_plank: document.getElementById('pronePlank').value || null,
    side_plank_left: document.getElementById('sidePlankLeft').value || null,
    side_plank_right: document.getElementById('sidePlankRight').value || null,
  };

  try {
    const res = await api(API, payload);
    if (res.ok) {
      document.getElementById('formWrap').style.display = 'none';
      document.getElementById('successCard').style.display = 'block';
      document.getElementById('successMsg').textContent = `Results for ${athleteFirst} ${athleteLast} (Year ${yearLevel}) saved to the leaderboard.`;
    } else {
      showToast('❌ Error saving. Try again.');
    }
  } catch(e) {
    showToast('❌ Network error. Try again.');
  }

  btn.disabled = false; btn.textContent = 'Save Results →';
}

function resetForm() {
  document.getElementById('formWrap').style.display = 'block';
  document.getElementById('successCard').style.display = 'none';
  document.getElementById('athleteFirst').value = '';
  document.getElementById('athleteLast').value = '';
  document.getElementById('yearLevel').value = '';
  document.querySelectorAll('.yr-btn').forEach(b => b.classList.remove('active'));
  ['height','weight','hollowHold','pronePlank','sidePlankLeft','sidePlankRight'].forEach(id => {
    document.getElementById(id).value = '';
  });
  selectedYear = null;
  window.scrollTo({top:0, behavior:'smooth'});
}
</script>
</body>
</html>
