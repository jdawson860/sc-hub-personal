<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Log Session — S&amp;C Hub</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --navy:#07122b;--navy2:#0c1f48;
    --accent:#e63946;
    --bg:#07122b;--card:#fff;--text:#07122b;--muted:#5a6a8a;--border:#d0daf0;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px}
  .header{background:var(--navy);color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(0,0,0,.35)}
  .header a{color:#8fa0be;text-decoration:none;font-size:13px;font-weight:600}
  .header-title{font-size:16px;font-weight:800}
  .main{padding:16px;max-width:640px;margin:0 auto}
  .card{background:var(--card);border-radius:14px;padding:18px;box-shadow:0 2px 16px rgba(0,0,0,.3);margin-bottom:14px}
  label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:6px}
  input[type="date"], input[type="text"]{width:100%;padding:10px 12px;border:2px solid var(--border);border-radius:9px;font-size:15px;color:var(--text);outline:none;background:#f8fafc}
  input[type="date"]:focus, input[type="text"]:focus{border-color:var(--accent)}
  .type-toggle{display:flex;gap:8px}
  .type-btn{flex:1;padding:12px;border:2px solid var(--border);background:#f8fafc;border-radius:9px;font-size:13px;font-weight:800;letter-spacing:.5px;color:var(--muted);cursor:pointer;transition:all .15s}
  .type-btn.active{background:var(--navy);border-color:var(--navy);color:#fff}
  .exercise-block{background:#f8fafc;border-radius:12px;padding:14px;margin-bottom:12px;border:1px solid var(--border)}
  .exercise-block-head{display:flex;gap:8px;align-items:center;margin-bottom:10px}
  .exercise-block-head input{flex:1}
  .mode-toggle{display:flex;border:1px solid var(--border);border-radius:7px;overflow:hidden;flex-shrink:0}
  .mode-btn{padding:8px 10px;border:none;background:#fff;color:var(--muted);font-size:11px;font-weight:700;cursor:pointer}
  .mode-btn.active{background:var(--navy2);color:#fff}
  .remove-ex{background:none;border:none;color:var(--accent);font-size:20px;cursor:pointer;padding:4px 8px;line-height:1;flex-shrink:0}
  .sets-table{width:100%;border-collapse:collapse;margin-top:6px}
  .sets-table th{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted);text-align:left;padding:4px 6px}
  .sets-table td{padding:4px 6px}
  .sets-table input{padding:8px;font-size:14px;text-align:center;border:1px solid var(--border);border-radius:7px;width:100%;background:#fff}
  .remove-set{background:none;border:none;color:#c0c8d8;font-size:16px;cursor:pointer}
  .add-set-btn{background:none;border:2px dashed var(--border);color:var(--muted);border-radius:8px;padding:8px 12px;font-size:13px;font-weight:700;cursor:pointer;width:100%;margin-top:8px}
  .add-ex-btn{background:var(--navy2);color:#fff;border:none;border-radius:10px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-bottom:14px}
  .save-btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:16px;font-size:16px;font-weight:800;cursor:pointer;width:100%;box-shadow:0 4px 14px rgba(230,57,70,.4)}
  .save-btn:disabled{opacity:.5;cursor:default}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.4);z-index:200;display:none}
  .empty-hint{color:var(--muted);font-size:13px;text-align:center;padding:20px 0}
  .recent-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
  .recent-item:last-child{border-bottom:none}
  .recent-date{font-weight:700;font-size:14px;color:var(--navy)}
  .recent-type{display:inline-block;background:var(--navy);color:#fff;font-size:10px;font-weight:800;padding:2px 6px;border-radius:5px;margin-left:6px;vertical-align:middle}
  .recent-meta{font-size:12px;color:var(--muted);margin-top:2px}
  .section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:0 0 10px 2px}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">💪 Log S&amp;C Session</div>
  <a href="dashboard.html">Dashboard →</a>
</div>

<div class="main">
  <div class="card">
    <label>Date</label>
    <input type="date" id="sessionDate" style="margin-bottom:14px">
    <label>Session Type</label>
    <div class="type-toggle">
      <button class="type-btn" data-type="UPPER" onclick="selectType('UPPER')">UPPER</button>
      <button class="type-btn" data-type="LOWER" onclick="selectType('LOWER')">LOWER</button>
      <button class="type-btn" data-type="OTHER" onclick="selectType('OTHER')">OTHER</button>
    </div>
  </div>

  <div id="exerciseList"></div>

  <button class="add-ex-btn" onclick="addExercise()">+ Add Exercise</button>
  <button class="save-btn" id="saveBtn" onclick="saveSession()">Save Session</button>

  <div class="card" style="margin-top:20px">
    <div class="section-title">Recent Sessions</div>
    <div id="recentList"><div class="empty-hint">Loading…</div></div>
  </div>
</div>

<datalist id="exerciseNames"></datalist>
<div class="toast" id="toast"></div>

<script>
const API = 'https://bruce-copy-ddd4bbe3.base44.app/functions';
let exerciseCount = 0;
let dashData = null;
let currentType = null;

function todayLocal(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
document.getElementById('sessionDate').value = todayLocal();

function timeModeKey(name){ return 'sc_timemode_' + name.trim().toLowerCase(); }
function isTimeMode(name){ return localStorage.getItem(timeModeKey(name)) === '1'; }
function setTimeMode(name, on){ localStorage.setItem(timeModeKey(name), on ? '1' : '0'); }

function selectType(type){
  currentType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('active', b.dataset.type === type));
  // Clear and autofill from last session of this type
  document.getElementById('exerciseList').innerHTML = '';
  exerciseCount = 0;
  const last = dashData && dashData.last_by_type ? dashData.last_by_type[type] : null;
  if(last && last.exercises && last.exercises.length){
    last.exercises.forEach(ex => {
      const id = addExercise(ex.name, true);
      // one row per previous set, with placeholders from that exact set
      const tbody = document.querySelector(`#${id} .sets-body`);
      tbody.innerHTML = '';
      ex.sets.forEach((s, i) => addSetRow(id, s));
      if(!ex.sets.length) addSetRow(id, null);
    });
  } else {
    addExercise();
  }
}

function getPlaceholderSet(exName, setIndex){
  if(!dashData || !dashData.exercise_history) return null;
  const hist = dashData.exercise_history[exName.trim().toLowerCase()];
  if(!hist || !hist.sets || !hist.sets.length) return null;
  // Only show a placeholder if that exact set number was actually recorded last time —
  // never duplicate the last known set into sets that weren't actually done.
  return hist.sets[setIndex] || null;
}

function addExercise(prefill, skipAutoSet){
  const id = 'ex' + (exerciseCount++);
  const name = prefill || '';
  const timeMode = name ? isTimeMode(name) : false;
  const wrap = document.createElement('div');
  wrap.className = 'exercise-block';
  wrap.id = id;
  wrap.innerHTML = `
    <div class="exercise-block-head">
      <input type="text" placeholder="Exercise name" class="ex-name" list="exerciseNames" value="${name}" oninput="onExerciseNameChange('${id}')">
      <div class="mode-toggle">
        <button type="button" class="mode-btn ${!timeMode?'active':''}" onclick="setMode('${id}', false)">Reps</button>
        <button type="button" class="mode-btn ${timeMode?'active':''}" onclick="setMode('${id}', true)">Time</button>
      </div>
      <button class="remove-ex" onclick="document.getElementById('${id}').remove()">×</button>
    </div>
    <table class="sets-table">
      <thead><tr><th style="width:36px">Set</th><th class="reps-hdr">${timeMode?'Time (s)':'Reps'}</th><th>Load</th><th>RPE</th><th style="width:24px"></th></tr></thead>
      <tbody class="sets-body"></tbody>
    </table>
    <button class="add-set-btn" onclick="addSetRow('${id}')">+ Add Set</button>
  `;
  document.getElementById('exerciseList').appendChild(wrap);
  if(!skipAutoSet) addSetRow(id, name ? getPlaceholderSet(name, 0) : null);
  return id;
}

function onExerciseNameChange(exId){
  const input = document.querySelector(`#${exId} .ex-name`);
  const name = input.value.trim();
  if(!name) return;
  // update time-mode toggle state based on saved preference
  setMode(exId, isTimeMode(name), true);
  // refresh placeholders for all existing set rows for this exercise
  const rows = document.querySelectorAll(`#${exId} .sets-body tr`);
  rows.forEach((row, i) => {
    const ph = getPlaceholderSet(name, i);
    row.querySelector('.set-reps').placeholder = ph && ph.reps != null ? String(ph.reps) : (isTimeMode(name) ? 'sec' : 'reps');
    row.querySelector('.set-load').placeholder = ph && ph.load != null ? String(ph.load) : 'kg / #slot';
    row.querySelector('.set-rpe').placeholder = ph && ph.rpe != null ? String(ph.rpe) : 'rpe';
  });
}

function setMode(exId, timeOn, skipSave){
  const block = document.getElementById(exId);
  block.querySelectorAll('.mode-btn')[0].classList.toggle('active', !timeOn);
  block.querySelectorAll('.mode-btn')[1].classList.toggle('active', timeOn);
  block.querySelector('.reps-hdr').textContent = timeOn ? 'Time (s)' : 'Reps';
  if(!skipSave){
    const name = block.querySelector('.ex-name').value.trim();
    if(name) setTimeMode(name, timeOn);
  }
  block.querySelectorAll('.set-reps').forEach(inp => {
    if(!inp.value) inp.placeholder = timeOn ? 'sec' : 'reps';
  });
}

function addSetRow(exId, placeholderSet){
  const tbody = document.querySelector(`#${exId} .sets-body`);
  const setNum = tbody.children.length + 1;
  const exName = document.querySelector(`#${exId} .ex-name`).value.trim();
  const timeOn = exName ? isTimeMode(exName) : false;
  const ph = placeholderSet || getPlaceholderSet(exName, setNum - 1);
  const row = document.createElement('tr');
  row.innerHTML = `
    <td style="text-align:center;font-weight:700;color:var(--muted)">${setNum}</td>
    <td><input type="text" inputmode="numeric" class="set-reps" placeholder="${ph && ph.reps != null ? ph.reps : (timeOn?'sec':'reps')}"></td>
    <td><input type="text" class="set-load" placeholder="${ph && ph.load != null ? ph.load : 'kg / #slot'}"></td>
    <td><input type="text" inputmode="numeric" class="set-rpe" placeholder="${ph && ph.rpe != null ? ph.rpe : 'rpe'}"></td>
    <td><button class="remove-set" onclick="this.closest('tr').remove(); renumberSets('${exId}')">×</button></td>
  `;
  tbody.appendChild(row);
}

function renumberSets(exId){
  const rows = document.querySelectorAll(`#${exId} .sets-body tr`);
  rows.forEach((r,i)=> r.children[0].textContent = i+1);
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(()=> t.style.display='none', 2500);
}

async function saveSession(){
  const date = document.getElementById('sessionDate').value;
  if(!date){ showToast('Pick a date first'); return; }
  if(!currentType){ showToast('Pick a session type first'); return; }
  const blocks = document.querySelectorAll('.exercise-block');
  const records = [];
  blocks.forEach(block => {
    const name = block.querySelector('.ex-name').value.trim();
    if(!name) return;
    const rows = block.querySelectorAll('.sets-body tr');
    rows.forEach((row, i) => {
      const reps = row.querySelector('.set-reps').value.trim();
      const load = row.querySelector('.set-load').value.trim();
      const rpe = row.querySelector('.set-rpe').value.trim();
      if(!reps && !load && !rpe) return;
      records.push({
        timestamp: date + 'T09:00:00',
        session_type: currentType,
        exercise: name,
        set_number: i+1,
        reps: reps || null,
        load: load || null,
        rpe: rpe || null,
      });
    });
  });
  if(!records.length){ showToast('Add at least one set'); return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Saving…';
  try{
    const res = await fetch(`${API}/submitSession`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(records) });
    const data = await res.json();
    if(data.ok){
      showToast(`Saved ${data.created} sets ✓`);
      await loadDashboardData();
      selectType(currentType);
      loadRecent();
    } else {
      showToast('Error saving session');
    }
  } catch(e){
    showToast('Network error');
  }
  btn.disabled = false; btn.textContent = 'Save Session';
}

function timeAgo(dateStr){
  const days = Math.floor((new Date(todayLocal()) - new Date(dateStr)) / 86400000);
  if(days === 0) return 'Today';
  if(days === 1) return 'Yesterday';
  return `${days}d ago`;
}

function loadRecent(){
  const list = document.getElementById('recentList');
  const sessions = (dashData && dashData.session_history || []).slice(0, 8);
  if(!sessions.length){ list.innerHTML = '<div class="empty-hint">No sessions logged yet</div>'; return; }
  list.innerHTML = sessions.map(s => `
    <div class="recent-item">
      <div>
        <div class="recent-date">${s.date}<span class="recent-type">${s.session_type}</span></div>
        <div class="recent-meta">${s.exercises.join(', ')}</div>
      </div>
      <div style="text-align:right">
        <div class="recent-meta">${s.totalSets} sets${s.avgRpe?` · RPE ${s.avgRpe}`:''}</div>
        <div class="recent-meta">${timeAgo(s.date)}</div>
      </div>
    </div>
  `).join('');
}

async function loadDashboardData(){
  try{
    const res = await fetch(`${API}/getDashboardData`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({}) });
    dashData = await res.json();
    const dl = document.getElementById('exerciseNames');
    dl.innerHTML = (dashData.exercise_names || []).map(n => `<option value="${n}">`).join('');
  } catch(e){
    dashData = { session_history: [], exercise_history: {}, last_by_type: {}, exercise_names: [] };
  }
}

(async function init(){
  await loadDashboardData();
  loadRecent();
  document.getElementById('exerciseList').innerHTML = '<div class="empty-hint">Pick a session type above to start logging</div>';
})();
</script>
</body>
</html>
