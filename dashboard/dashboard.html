<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rowing Hub — S&amp;C Dashboard</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --navy:#07122b;--navy2:#0c1f48;
    --accent:#e63946;--warn:#f59e0b;--green:#22c55e;
    --bg:#07122b;--card:#fff;--text:#07122b;--muted:#5a6a8a;--border:#d0daf0;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  .header{background:var(--navy);color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(0,0,0,.35)}
  .header-title{font-size:16px;font-weight:800}
  .header-sub{font-size:11px;color:#8fa0be}
  .header a{color:#fff;text-decoration:none;font-size:13px;font-weight:700;background:var(--accent);padding:8px 14px;border-radius:8px}
  .main{padding:16px;max-width:640px;margin:0 auto}
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
  .stat-card{background:var(--card);border-radius:12px;padding:14px 16px;box-shadow:0 2px 12px rgba(0,0,0,.25);border-left:4px solid var(--accent)}
  .stat-card.green{border-left-color:var(--green)}
  .stat-card.warn{border-left-color:var(--warn)}
  .stat-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:4px}
  .stat-value{font-size:22px;font-weight:800;color:var(--navy);line-height:1}
  .stat-sub{font-size:11px;color:var(--muted);margin-top:3px}
  .card{background:var(--card);border-radius:14px;padding:18px;box-shadow:0 2px 16px rgba(0,0,0,.3);margin-bottom:14px}
  .section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:12px}
  .data-table{width:100%;border-collapse:collapse}
  .data-table th{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted);text-align:left;padding:6px 8px;border-bottom:2px solid var(--border)}
  .data-table td{padding:8px;font-size:13px;border-bottom:1px solid var(--border)}
  .data-table tr:last-child td{border-bottom:none}
  .data-table tr:hover td{background:#f8fafc;cursor:pointer}
  .empty-hint{color:var(--muted);font-size:13px;text-align:center;padding:20px 0}
  .acwr-badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:800}
  .acwr-optimal{background:#e8f5e9;color:#2e7d32}
  .acwr-low{background:#e3f2fd;color:#1565c0}
  .acwr-high{background:#fce4ec;color:#c62828}
  .acwr-mid{background:#fff3e0;color:#e65100}
  .prog-item{padding:8px 0;border-bottom:1px solid var(--border)}
  .prog-item:last-child{border-bottom:none}
  .prog-name{font-weight:700;font-size:13px;color:var(--navy)}
  .prog-meta{font-size:12px;color:var(--muted);margin-top:2px}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">🚣 Rowing Hub</div>
    <div class="header-sub">S&amp;C Dashboard</div>
  </div>
  <a href="logger.html">+ Log Session</a>
</div>

<div class="main">
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card"><div class="stat-label">Loading</div><div class="stat-value">…</div></div>
  </div>

  <div class="card">
    <div class="section-title">Recent Sessions</div>
    <table class="data-table">
      <thead><tr><th>Date</th><th>Type</th><th>Exercises</th><th>Sets</th><th>Load</th></tr></thead>
      <tbody id="sessionRows"><tr><td colspan="5" class="empty-hint">Loading…</td></tr></tbody>
    </table>
  </div>

  <div class="card">
    <div class="section-title">Exercise Progress</div>
    <div id="progList"><div class="empty-hint">Loading…</div></div>
  </div>
</div>

<script>
const API = 'https://bruce-copy-ddd4bbe3.base44.app/functions';

function acwrClass(v){
  if(v == null) return 'acwr-mid';
  if(v < 0.8) return 'acwr-low';
  if(v <= 1.3) return 'acwr-optimal';
  if(v <= 1.5) return 'acwr-mid';
  return 'acwr-high';
}
function daysAgoLabel(n){
  if(n == null) return '—';
  if(n === 0) return 'Today';
  if(n === 1) return 'Yesterday';
  return `${n}d ago`;
}

async function load(){
  try{
    const res = await fetch(`${API}/getDashboardData`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({}) });
    const d = await res.json();
    if(!d.ok) throw new Error(d.error || 'failed');

    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card green">
        <div class="stat-label">Last Session</div>
        <div class="stat-value">${daysAgoLabel(d.days_since_last)}</div>
        <div class="stat-sub">${d.last_session ? d.last_session.date : 'No sessions yet'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">ACWR</div>
        <div class="stat-value">${d.acwr != null ? `<span class="acwr-badge ${acwrClass(d.acwr)}">${d.acwr.toFixed(2)}</span>` : '—'}</div>
        <div class="stat-sub">${d.acwr_provisional ? `${d.days_until_acwr}d until ready` : (d.acwr!=null ? `Acute ${d.acute} / Chronic ${d.chronic}` : 'Not enough data')}</div>
      </div>
      <div class="stat-card warn">
        <div class="stat-label">Weekly Load</div>
        <div class="stat-value">${d.weekly_load || 0}</div>
        <div class="stat-sub">Last 7 days</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg RPE</div>
        <div class="stat-value">${d.avg_rpe ?? '—'}</div>
        <div class="stat-sub">${d.total_sessions} total sessions</div>
      </div>
    `;

    const rows = (d.session_history || []).slice(0, 12);
    document.getElementById('sessionRows').innerHTML = rows.length ? rows.map(s => `
      <tr onclick="location.href='session.html?date=${encodeURIComponent(s.date)}&type=${encodeURIComponent(s.session_type||'OTHER')}'" style="cursor:pointer" title="Tap to view/edit">
        <td style="font-weight:700">${s.date}</td>
        <td><span style="background:var(--navy);color:#fff;font-size:10px;font-weight:800;padding:2px 6px;border-radius:5px">${s.session_type||'—'}</span></td>
        <td>${s.exercises.slice(0,3).join(', ')}${s.exercises.length>3?` +${s.exercises.length-3}`:''}</td>
        <td>${s.totalSets}</td>
        <td>${s.totalLoad}</td>
      </tr>
    `).join('') : `<tr><td colspan="5" class="empty-hint">No sessions logged yet — <a href="logger.html">log your first one</a></td></tr>`;

    const prog = (d.exercise_progressions || []).slice(0, 8);
    document.getElementById('progList').innerHTML = prog.length ? prog.map(p => {
      const last = p.points[p.points.length - 1];
      const prev = p.points.length > 1 ? p.points[p.points.length - 2] : null;
      let trend = '';
      if(prev && last.avgLoad != null && prev.avgLoad != null){
        const diff = last.avgLoad - prev.avgLoad;
        trend = diff > 0 ? ` <span style="color:var(--green)">▲ +${diff.toFixed(1)}</span>` : diff < 0 ? ` <span style="color:var(--accent)">▼ ${diff.toFixed(1)}</span>` : '';
      }
      return `
        <div class="prog-item">
          <div class="prog-name">${p.exercise}</div>
          <div class="prog-meta">Last: ${last.date} · ${last.avgLoad ?? '—'} load${last.avgRpe?` · RPE ${last.avgRpe}`:''}${trend}</div>
        </div>
      `;
    }).join('') : '<div class="empty-hint">No exercise history yet</div>';

  } catch(e){
    document.getElementById('statsGrid').innerHTML = `<div class="stat-card"><div class="stat-label">Error</div><div class="stat-value" style="font-size:14px">${e.message}</div></div>`;
  }
}

load();
</script>
</body>
</html>
